<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>M Coffee - Floor Plan</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; background-color: #f9f9f8; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#553722",
                        secondary: "#4a6549",
                        surface: "#f9f9f8",
                        'surface-container': "#eeeeed",
                        'on-surface-variant': "#50453e",
                    },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
</head>
<body class="font-body text-on-surface antialiased">
    <!-- Top AppBar -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-surface/80 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">coffee</span>
            </div>
            <h1 class="font-headline font-black tracking-tight text-2xl text-primary">M Coffee</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" alt="User">
        </div>
    </header>

    <main class="pt-28 px-6 pb-40">
        <!-- Header Section -->
        <section class="mb-8">
            <h2 class="text-5xl font-black text-primary mb-2">Floor<br>Plan</h2>
            <div class="flex justify-between items-center mt-4">
                <p class="text-on-surface-variant font-medium">Floor Selection</p>
                <div class="flex gap-2 p-1 bg-surface-container rounded-full overflow-x-auto no-scrollbar">
                    <button onclick="setFloor('ground')" id="btn-ground" class="floor-tab px-6 py-2 rounded-full bg-primary text-white font-bold transition-all">GROUND</button>
                    <button onclick="setFloor('hallway')" id="btn-hallway" class="floor-tab px-6 py-2 rounded-full text-on-surface-variant font-medium transition-all hover:bg-surface-container-high">HALLWAY</button>
                    <button onclick="setFloor('upstairs')" id="btn-upstairs" class="floor-tab px-6 py-2 rounded-full text-on-surface-variant font-medium transition-all hover:bg-surface-container-high">UPSTAIRS</button>
                </div>
            </div>
        </section>

        <!-- Visual Layout Area -->
        <div id="visual-layout" class="w-full mb-12 min-h-[300px]">
            <div class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-primary border-t-transparent"></div>
            </div>
        </div>

        <!-- Active Orders Section -->
        <section class="mb-6">
            <h3 class="text-2xl font-black text-primary mb-6">Active Orders</h3>
            <div id="active-orders-list">
                <!-- Orders loaded dynamically -->
            </div>
        </section>
    </main>

    <!-- Floating Action Button -->
    <button class="fixed bottom-32 right-6 w-16 h-16 rounded-3xl bg-[#6f4e37] text-white shadow-2xl flex items-center justify-center z-40 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-100 flex justify-around items-center px-4 pb-8 pt-4 bg-white/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)]">
        <div class="flex flex-col items-center justify-center gap-1 min-w-[64px]">
            <div class="bg-primary text-white rounded-2xl p-3 w-12 h-12 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">grid_view</span>
            </div>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">menu_book</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Menu</span>
        </div>
        <div onclick="window.location.href='../cart_checkout/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">shopping_cart</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Cart</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">cooking</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Kitchen</span>
        </div>
        <div onclick="window.location.href='../order_history/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">history</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">History</span>
        </div>
    </nav>

    <script shadow>
        let tables = [];
        let activeOrders = [];
        let currentFloor = 'ground';

        document.addEventListener('DOMContentLoaded', async () => {
            await initializeData();
        });

        async function initializeData() {
            await loadTables();
            await loadActiveOrders();
        }

        async function loadTables() {
            let retryCount = 0;
            while (!window.api && retryCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                retryCount++;
            }
            if (!window.api) return;
            try {
                tables = await window.api.getTables();
                renderVisualLayout();
            } catch (err) { console.error(err); }
        }

        async function loadActiveOrders() {
            if (!window.api) return;
            try {
                activeOrders = await window.api.getActiveOrders();
                renderActiveOrders();
            } catch (err) { console.error(err); }
        }

        function setFloor(floor) {
            currentFloor = floor;
            renderVisualLayout();
            document.querySelectorAll('.floor-tab').forEach(btn => {
                const isActive = btn.id === `btn-${floor}`;
                btn.className = isActive ? 
                    'floor-tab px-6 py-2 rounded-full bg-primary text-white font-bold transition-all' : 
                    'floor-tab px-6 py-2 rounded-full text-on-surface-variant font-medium transition-all hover:bg-surface-container-high';
            });
        }

        function renderVisualLayout() {
            const container = document.getElementById('visual-layout');
            const filtered = tables.filter(t => t.floor_zone?.toLowerCase() === currentFloor.toLowerCase() || (!t.floor_zone && currentFloor === 'ground'));
            const availableCount = tables.filter(t => t.status === 'available').length;
            const occupiedCount = tables.filter(t => t.status === 'occupied').length;

            container.innerHTML = `
                <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar">
                    <div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full whitespace-nowrap">
                        <div class="w-3 h-3 rounded-full bg-stone-300"></div>
                        <span class="text-sm font-semibold text-on-surface-variant">Available (${availableCount})</span>
                    </div>
                    <div class="flex items-center gap-2 bg-[#ccebc7] px-4 py-2 rounded-full whitespace-nowrap text-[#334d33]">
                        <div class="w-3 h-3 rounded-full bg-stone-600"></div>
                        <span class="text-sm font-bold text-secondary">Occupied (${occupiedCount})</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    ${filtered.map(t => `
                        <div onclick="tableClick('${t.id}')" class="${t.status === 'occupied' ? 'bg-[#ccebc7] border-secondary' : 'bg-white border-stone-100'} border-2 rounded-[2rem] p-8 flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-all shadow-sm relative aspect-square">
                            <span class="text-3xl font-black ${t.status === 'occupied' ? 'text-secondary' : 'text-primary'}">${t.table_number}</span>
                            ${t.status === 'occupied' ? '<span class="text-[10px] bg-secondary/10 px-3 py-1 rounded-full font-bold text-secondary mt-2 uppercase tracking-wide">In Use</span>' : ''}
                            <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-8 h-2 bg-stone-100 rounded-full"></div>
                            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-8 h-2 bg-stone-100 rounded-full"></div>
                            <div class="absolute top-1/2 -translate-y-1/2 -left-1 w-2 h-8 bg-stone-100 rounded-full"></div>
                            <div class="absolute top-1/2 -translate-y-1/2 -right-1 w-2 h-8 bg-stone-100 rounded-full"></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function tableClick(tableId) {
            const api = window.api;
            if (!api) return;
            const table = tables.find(t => t.id === tableId);
            if (table.status !== 'occupied') {
                await api.updateTableStatus(tableId, 'occupied');
            }
            window.location.href = `../customer_menu/code.html?table=${tableId}`;
        }

        function renderActiveOrders() {
            const container = document.getElementById('active-orders-list');
            if (activeOrders.length === 0) {
                container.innerHTML = '<p class="text-center py-8 opacity-50">No active orders</p>';
                return;
            }
            container.innerHTML = activeOrders.map(o => `
                <div onclick="window.location.href='../kitchen_queue/code.html'" class="bg-white rounded-[2xl] p-6 mb-4 flex items-center justify-between border-l-8 border-secondary shadow-sm hover:shadow-md transition-all cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-[#ccebc7] flex items-center justify-center text-secondary font-black text-xl">${o.table_number || 'T'}</div>
                        <div>
                            <h4 class="font-bold text-primary">${o.pending_items || 'Coffee & More'}</h4>
                            <p class="text-[10px] text-secondary font-bold uppercase tracking-widest">In Service</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black text-primary">$${o.total_amount?.toFixed(2) || '0.00'}</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
