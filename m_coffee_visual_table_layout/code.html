<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>M Coffee - Floor Plan</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; background-color: #f9f9f8; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#553722",
                        secondary: "#4a6549",
                        surface: "#f9f9f8",
                        'surface-container': "#eeeeed",
                        'on-surface-variant': "#50453e",
                    },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
</head>
<body class="font-body text-on-surface antialiased">
    <!-- Top AppBar -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-surface/80 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">coffee</span>
            </div>
            <h1 class="font-headline font-black tracking-tight text-2xl text-primary">M Coffee</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="openTableManager()" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container hover:bg-[#e0e0e0] transition-colors"><span class="material-symbols-outlined text-on-surface-variant text-[20px]">tune</span></button>
            <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" alt="User">
        </div>
    </header>

    <main class="pt-28 px-6 pb-40">
        <!-- Header Section -->
        <section class="mb-8">
            <h2 class="text-5xl font-black text-primary mb-2">Floor<br>Plan</h2>
            <div class="flex justify-between items-center mt-4">
                <p class="text-on-surface-variant font-medium">Floor Selection</p>
                <div id="floor-tabs-container" class="flex gap-2 p-1 bg-surface-container rounded-full overflow-x-auto no-scrollbar">
                    <!-- Floor tabs dynamically generated here -->
                </div>
            </div>
        </section>

        <!-- Visual Layout Area -->
        <div id="visual-layout" class="w-full mb-12 min-h-[300px]">
            <div class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-primary border-t-transparent"></div>
            </div>
        </div>

        <!-- Active Orders Section -->
        <section class="mb-6">
            <h3 class="text-2xl font-black text-primary mb-6">Active Orders</h3>
            <div id="active-orders-list">
                <!-- Orders loaded dynamically -->
            </div>
        </section>
    </main>

    <!-- Floating Action Button -->
    <button id="fab-action" onclick="confirmTableSelection()" class="fixed bottom-32 right-6 w-16 h-16 rounded-3xl bg-[#6f4e37] text-white shadow-2xl flex items-center justify-center z-40 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-100 flex justify-around items-center px-4 pb-8 pt-4 bg-white/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)]">
        <div class="flex flex-col items-center justify-center gap-1 min-w-[64px]">
            <div class="bg-primary text-white rounded-2xl p-3 w-12 h-12 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">grid_view</span>
            </div>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">menu_book</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Menu</span>
        </div>
        <div onclick="window.location.href='../cart_checkout/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">shopping_cart</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Cart</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">cooking</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Kitchen</span>
        </div>
        <div onclick="window.location.href='../order_history/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">history</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">History</span>
        </div>
    </nav>

    <!-- Table Management Modal -->
    <div id="table-manager-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeTableManager()"></div>
        <div class="absolute bottom-0 left-0 w-full h-[85vh] bg-surface rounded-t-[2rem] shadow-2xl flex flex-col transform transition-transform translate-y-full" id="table-manager-content">
            <div class="flex justify-between items-center p-6 border-b border-stone-200">
                <h2 class="text-2xl font-black text-primary">Quản lý Bàn & Lầu</h2>
                <button onclick="closeTableManager()" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="p-6 bg-white border-b border-stone-200 flex flex-col gap-4">
                <h3 class="font-bold text-lg text-primary">Thêm Bàn Mới</h3>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Khu vực / Lầu</label>
                        <select id="new-table-floor" class="w-full bg-surface-container rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary font-medium" onchange="handleFloorSelectChange(this)">
                            <!-- Options generated dynamically -->
                        </select>
                        <input type="text" id="new-table-floor-custom" placeholder="Nhập tên lầu mới" class="w-full bg-surface-container rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary font-medium mt-2 hidden">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Tên Bàn</label>
                        <input type="text" id="new-table-name" placeholder="Ví dụ: Bàn 12" class="w-full bg-surface-container rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary font-medium">
                    </div>
                    <div class="flex items-end">
                        <button onclick="addNewTable()" class="h-12 px-6 rounded-xl bg-primary text-white font-bold hover:bg-[#6f4e37] transition-colors w-full md:w-auto">THÊM</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 bg-surface">
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-stone-100">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container-low text-on-surface-variant text-sm border-b border-stone-200">
                                <th class="p-4 font-bold uppercase tracking-wider">Mã (ID)</th>
                                <th class="p-4 font-bold uppercase tracking-wider">Khu vực / Lầu</th>
                                <th class="p-4 font-bold uppercase tracking-wider">Tên Bàn</th>
                                <th class="p-4 font-bold uppercase tracking-wider text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="manage-tables-list" class="divide-y divide-stone-100">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script shadow>
        let tables = [];
        let activeOrders = [];
        let currentFloor = 'ground';
        let selectedTableId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await initializeData();
        });

        async function initializeData() {
            let retryCount = 0;
            while (!window.api && retryCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                retryCount++;
            }
            if (!window.api) return;
            try {
                tables = await window.api.getTables();
                if(tables.length > 0 && !tables.some(t => t.floor_zone === currentFloor)) {
                    currentFloor = tables[0].floor_zone;
                } else if(tables.length === 0) {
                    currentFloor = 'ground';
                }
                renderFloorTabs();
                renderVisualLayout();
                await loadActiveOrders();
            } catch (err) { console.error(err); }
        }

        async function loadActiveOrders() {
            if (!window.api) return;
            try {
                activeOrders = await window.api.getActiveOrders();
                renderActiveOrders();
            } catch (err) { console.error(err); }
        }

        function renderFloorTabs() {
            const container = document.getElementById('floor-tabs-container');
            const floors = [...new Set(tables.map(t => t.floor_zone))].filter(Boolean);
            if(floors.length === 0) floors.push('ground'); // default fallback

            container.innerHTML = floors.map(floor => {
                const isActive = floor === currentFloor;
                const formattedFloor = floor.replace(/_/g, ' ').toUpperCase();
                return `<button onclick="setFloor('${floor}')" data-floor="${floor}" class="floor-tab px-6 py-2 rounded-full ${isActive ? 'bg-primary text-white font-bold' : 'text-on-surface-variant font-medium hover:bg-surface-container-high'} transition-all">${formattedFloor}</button>`;
            }).join('');
        }

        function setFloor(floor) {
            currentFloor = floor;
            selectedTableId = null;
            updateFAB();
            renderFloorTabs();
            renderVisualLayout();
        }

        function renderVisualLayout() {
            const container = document.getElementById('visual-layout');
            const filtered = tables.filter(t => {
                if (!t.floor_zone) return currentFloor === 'ground';
                const zone = t.floor_zone.toLowerCase();
                if (currentFloor === 'ground') return zone === 'ground' || zone === 'ground_floor';
                return zone.includes(currentFloor.toLowerCase());
            });
            const availableCount = tables.filter(t => t.status === 'available').length;
            const occupiedCount = tables.filter(t => t.status === 'occupied').length;

            container.innerHTML = `
                <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar">
                    <div class="flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full whitespace-nowrap">
                        <div class="w-3 h-3 rounded-full bg-stone-300"></div>
                        <span class="text-sm font-semibold text-on-surface-variant">Available (${availableCount})</span>
                    </div>
                    <div class="flex items-center gap-2 bg-[#ccebc7] px-4 py-2 rounded-full whitespace-nowrap text-[#334d33]">
                        <div class="w-3 h-3 rounded-full bg-stone-600"></div>
                        <span class="text-sm font-bold text-secondary">Occupied (${occupiedCount})</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    ${filtered.map(t => {
                        const isSelected = selectedTableId === t.id;
                        const isOccupied = t.status === 'occupied';
                        return `
                        <div onclick="tableClick('${t.id}')" class="${isOccupied ? 'bg-[#ccebc7] border-secondary' : isSelected ? 'bg-white border-primary ring-4 ring-primary/10' : 'bg-white border-stone-100'} border-2 rounded-[2rem] p-8 flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-all shadow-sm relative aspect-square">
                            <span class="text-3xl font-black ${isOccupied ? 'text-secondary' : isSelected ? 'text-primary' : 'text-primary opacity-40'}">${t.table_number}</span>
                            ${isOccupied ? '<span class="text-[10px] bg-secondary/10 px-3 py-1 rounded-full font-bold text-secondary mt-2 uppercase tracking-wide">In Use</span>' : isSelected ? '<span class="text-[10px] bg-primary/10 px-3 py-1 rounded-full font-bold text-primary mt-2 uppercase tracking-wide">Selected</span>' : ''}
                            <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-8 h-2 bg-stone-100 rounded-full"></div>
                            <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-8 h-2 bg-stone-100 rounded-full"></div>
                            <div class="absolute top-1/2 -translate-y-1/2 -left-1 w-2 h-8 bg-stone-100 rounded-full"></div>
                            <div class="absolute top-1/2 -translate-y-1/2 -right-1 w-2 h-8 bg-stone-100 rounded-full"></div>
                        </div>
                    `}).join('')}
                </div>
            `;
        }

        function tableClick(tableId) {
            const table = tables.find(t => t.id === tableId);
            if (table.status === 'occupied') {
                alert('Bàn này đang được sử dụng!');
                return;
            }
            if (selectedTableId === tableId) selectedTableId = null;
            else selectedTableId = tableId;
            renderVisualLayout();
            updateFAB();
        }

        function updateFAB() {
            const fab = document.getElementById('fab-action');
            if (selectedTableId) {
                fab.className = 'fixed bottom-32 right-6 w-16 h-16 rounded-3xl bg-primary text-white shadow-2xl flex items-center justify-center z-40 active:scale-95 transition-all opacity-100 cursor-pointer';
                fab.innerHTML = '<span class="material-symbols-outlined text-3xl">check</span>';
            } else {
                fab.className = 'fixed bottom-32 right-6 w-16 h-16 rounded-3xl bg-[#6f4e37] text-white shadow-2xl flex items-center justify-center z-40 active:scale-95 transition-all opacity-50 cursor-not-allowed';
                fab.innerHTML = '<span class="material-symbols-outlined text-3xl">add</span>';
            }
        }

        async function confirmTableSelection() {
            if (!selectedTableId) return;
            try {
                const api = window.api;
                await api.updateTableStatus(selectedTableId, 'occupied');
                window.location.href = `../customer_menu/code.html?table=${selectedTableId}`;
            } catch (err) { console.error(err); }
        }

        function renderActiveOrders() {
            const container = document.getElementById('active-orders-list');
            if (activeOrders.length === 0) {
                container.innerHTML = '<p class="text-center py-8 opacity-50">No active orders</p>';
                return;
            }
            container.innerHTML = activeOrders.map(o => `
                <div onclick="window.location.href='../kitchen_queue/code.html'" class="bg-white rounded-[2xl] p-6 mb-4 flex items-center justify-between border-l-8 border-secondary shadow-sm hover:shadow-md transition-all cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-[#ccebc7] flex items-center justify-center text-secondary font-black text-xl">${o.order_type === 'takeaway' ? 'T/A' : (o.tables?.table_number || 'T')}</div>
                        <div>
                            <h4 class="font-bold text-primary">${o.order_items ? o.order_items.reduce((acc, i) => acc + i.quantity, 0) : 1} Items</h4>
                            <p class="text-[10px] text-secondary font-bold uppercase tracking-widest">In Service</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black text-primary">$${o.total_amount?.toFixed(2) || '0.00'}</span>
                    </div>
                </div>
            `).join('');
        }

        /* --- TABLE MANAGEMENT LOGIC --- */
        function openTableManager() {
            const modal = document.getElementById('table-manager-modal');
            const content = document.getElementById('table-manager-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('translate-y-full');
            }, 10);
            renderManageTables();
            updateFloorSelectOptions();
        }

        function closeTableManager() {
            const modal = document.getElementById('table-manager-modal');
            const content = document.getElementById('table-manager-content');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function handleFloorSelectChange(selectElem) {
            const customInput = document.getElementById('new-table-floor-custom');
            if (selectElem.value === '_new_') {
                customInput.classList.remove('hidden');
                customInput.focus();
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        }

        function updateFloorSelectOptions() {
            const select = document.getElementById('new-table-floor');
            const floors = [...new Set(tables.map(t => t.floor_zone))].filter(Boolean);
            select.innerHTML = floors.map(f => `<option value="${f}">${f.replace(/_/g, ' ').toUpperCase()}</option>`).join('') +
                               `<option value="_new_">+ Thêm lầu mới...</option>`;
            
            const customInput = document.getElementById('new-table-floor-custom');
            customInput.classList.add('hidden');
            customInput.value = '';
            
            if(floors.length === 0) {
                select.value = '_new_';
                handleFloorSelectChange(select);
            }
        }

        function renderManageTables() {
            const list = document.getElementById('manage-tables-list');
            if(tables.length === 0) {
                list.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-stone-400 font-medium">Chưa có bàn nào. Hãy thêm bàn mới.</td></tr>`;
                return;
            }

            const sortedTables = [...tables].sort((a,b) => a.floor_zone.localeCompare(b.floor_zone) || a.table_number.localeCompare(b.table_number));
            
            list.innerHTML = sortedTables.map(t => `
                <tr class="hover:bg-surface-container-low transition-colors" id="row-${t.id}">
                    <td class="p-4 text-xs font-mono text-stone-400 align-middle max-w-[80px] truncate" title="${t.id}">${t.id.substring(0,8)}...</td>
                    <td class="p-4 align-middle">
                        <input type="text" class="w-full bg-transparent border border-transparent hover:border-stone-200 focus:border-primary focus:bg-white rounded px-2 py-1 transition-all text-sm font-medium uppercase" value="${t.floor_zone}" id="edit-floor-${t.id}">
                    </td>
                    <td class="p-4 align-middle">
                        <input type="text" class="w-full bg-transparent border border-transparent hover:border-stone-200 focus:border-primary focus:bg-white rounded px-2 py-1 transition-all text-base font-bold text-primary" value="${t.table_number}" id="edit-name-${t.id}">
                    </td>
                    <td class="p-4 align-middle text-right whitespace-nowrap">
                        <button onclick="saveManagedTable('${t.id}')" class="px-3 py-1.5 rounded-lg bg-[#ccebc7] text-secondary font-bold text-xs hover:bg-[#b0dfa8] transition-colors mr-2">LƯU</button>
                        <button onclick="deleteManagedTable('${t.id}')" class="px-3 py-1.5 rounded-lg bg-red-100 text-red-700 font-bold text-xs hover:bg-red-200 transition-colors">XOÁ</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addNewTable() {
            const nameInput = document.getElementById('new-table-name');
            const select = document.getElementById('new-table-floor');
            const customInput = document.getElementById('new-table-floor-custom');
            
            const name = nameInput.value.trim();
            let floor = select.value === '_new_' ? customInput.value.trim() : select.value;
            
            if (!name) {
                alert('Vui lòng nhập tên bàn!');
                return;
            }
            if (!floor) {
                alert('Vui lòng chọn hoặc nhập tên lầu!');
                return;
            }
            
            // Generate a slug-like floor zone for consistency
            floor = floor.toLowerCase().replace(/\s+/g, '_');

            try {
                const newTable = await window.api.addTable({ table_number: name, floor_zone: floor });
                tables.push(newTable);
                nameInput.value = '';
                updateFloorSelectOptions();
                renderManageTables();
                renderFloorTabs();
                renderVisualLayout();
            } catch (err) {
                console.error(err);
                if(err.message?.includes('duplicate key') || err.code === '23505') {
                    alert('Tên bàn này đã tồn tại, vui lòng chọn tên khác!');
                } else {
                    alert('Có lỗi xảy ra khi thêm bàn.');
                }
            }
        }

        async function saveManagedTable(id) {
            const floorInput = document.getElementById(`edit-floor-${id}`);
            const nameInput = document.getElementById(`edit-name-${id}`);
            const newFloor = floorInput.value.trim().toLowerCase().replace(/\s+/g, '_');
            const newName = nameInput.value.trim();
            
            if (!newName || !newFloor) {
                alert('Tên lầu và Tên bàn không được để trống!');
                return;
            }
            
            try {
                const updatedTable = await window.api.updateTable(id, { table_number: newName, floor_zone: newFloor });
                const index = tables.findIndex(t => t.id === id);
                if(index !== -1) tables[index] = updatedTable;
                renderFloorTabs();
                renderVisualLayout();
                updateFloorSelectOptions();
                renderManageTables();
                // small visual feedback
                const row = document.getElementById(`row-${id}`);
                const origBg = row.style.backgroundColor;
                row.style.backgroundColor = '#ccebc7';
                setTimeout(() => row.style.backgroundColor = origBg, 500);
            } catch (err) {
                console.error(err);
                if(err.message?.includes('duplicate key') || err.code === '23505') {
                    alert('Tên bàn này đã tồn tại!');
                } else {
                    alert('Có lỗi xảy ra khi lưu thay đổi.');
                }
            }
        }

        async function deleteManagedTable(id) {
            if(!confirm('Bạn có chắc chắn muốn xoá bàn này không? Không thể hoàn tác.')) return;
            try {
                await window.api.deleteTable(id);
                tables = tables.filter(t => t.id !== id);
                
                // If we deleted the last table on the current floor, switch floor
                if(tables.length > 0 && !tables.some(t => t.floor_zone === currentFloor)) {
                    currentFloor = tables[0].floor_zone;
                } else if(tables.length === 0) {
                    currentFloor = 'ground';
                }
                
                renderFloorTabs();
                renderVisualLayout();
                updateFloorSelectOptions();
                renderManageTables();
            } catch (err) {
                console.error(err);
                alert('Không thể xoá bàn này (có thể bàn đang có đơn đặt hàng liên quan).');
            }
        }
    </script>
</body>
</html>
