<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>M Coffee - Table Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2e2",
                        "secondary-fixed-dim": "#b0cfad",
                        "error-container": "#ffdad6",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2f3130",
                        "surface-container-low": "#f4f4f3",
                        "on-tertiary-fixed": "#201a18",
                        "surface-container-highest": "#e2e2e2",
                        "outline-variant": "#d4c3ba",
                        "surface-tint": "#79573f",
                        "on-secondary-fixed-variant": "#334d33",
                        "secondary-container": "#ccebc7",
                        "primary-fixed-dim": "#eabda0",
                        "on-primary-fixed-variant": "#5f402a",
                        "on-primary-fixed": "#2d1604",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#5b5451",
                        "inverse-on-surface": "#f1f1f0",
                        "inverse-primary": "#eabda0",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9f8",
                        "background": "#f9f9f8",
                        "on-surface": "#1a1c1c",
                        "tertiary": "#443d3a",
                        "primary-container": "#6f4e37",
                        "primary": "#553722",
                        "on-tertiary-container": "#d3c8c5",
                        "surface-dim": "#dadad9",
                        "surface": "#f9f9f8",
                        "on-secondary-fixed": "#07200b",
                        "on-tertiary-fixed-variant": "#4c4542",
                        "on-surface-variant": "#50453e",
                        "outline": "#82746d",
                        "on-secondary-container": "#506b4f",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ece0dc",
                        "surface-container": "#eeeeed",
                        "surface-container-high": "#e8e8e7",
                        "secondary": "#4a6549",
                        "tertiary-fixed-dim": "#cfc4c0",
                        "secondary-fixed": "#ccebc7",
                        "primary-fixed": "#ffdcc6",
                        "on-primary-container": "#eec1a4"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<script>
    // Configuration
    // Configuration - Use Supabase client directly
    const api = window.api;
    
    // State
    let tables = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadTables();
    });

    // Load tables
    async function loadTables() {
        try {
            tables = await api.getTables();
            renderVisualLayout();
        } catch (err) {
            console.error('Failed to load tables:', err);
            renderVisualLayoutFallback();
        }
    }

    // Render visual layout
    function renderVisualLayout() {
        const container = document.getElementById('visual-layout');
        if (!container) return;
        
        container.innerHTML = `
            <div class="relative w-full aspect-[4/3] bg-surface-container rounded-3xl p-6 overflow-hidden">
                <!-- Floor background -->
                <div class="absolute inset-0 bg-[url('https://lh3.googleusercontent.com/aida-public/AB6AXuBk)] bg-cover opacity-20"></div>
                
                <div class="relative z-10 grid grid-cols-4 gap-4 h-full">
                    ${tables.slice(0, 8).map(table => renderTableShape(table)).join('')}
                </div>
            </div>
        `;
    }

    // Render table shape
    function renderTableShape(table) {
        const isAvailable = table.status === 'available';
        const bgColor = isAvailable ? 'bg-secondary-container' : 'bg-primary-container';
        const textColor = isAvailable ? 'text-on-secondary-container' : 'text-on-primary';
        
        return `
            <div onclick="tableClick('${table.id}')" class="${bgColor} ${textColor} rounded-2xl p-4 flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform shadow-lg">
                <span class="text-2xl font-black mb-1">${table.table_number}</span>
                <span class="text-xs font-bold">${table.status}</span>
                <div class="mt-2 flex items-center gap-1 text-xs opacity-70">
                    <span class="material-symbols-outlined text-sm">person</span>
                    ${table.capacity}
                </div>
            </div>
        `;
    }

    // Table click handler
    function tableClick(tableId) {
        const table = tables.find(t => t.id === tableId);
        if (table?.status === 'occupied') {
            // Go to kitchen to view current order
            window.location.href = '../kitchen_queue/code.html';
        } else {
            // Table is available - go to menu to create new order
            window.location.href = `../customer_menu/code.html?table=${tableId}`;
        }
    }

    // Fallback
    function renderVisualLayoutFallback() {
        const container = document.getElementById('visual-layout');
        container.innerHTML = `
            <div class="text-center py-12 text-on-surface-variant">
                <span class="material-symbols-outlined text-6xl">table_restaurant</span>
                <p class="mt-4">Loading layout...</p>
            </div>
        `;
    }
</script>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed antialiased">
<!-- Top AppBar -->

<span class="material-symbols-outlined text-2xl text-[#553722] dark:text-stone-200" data-icon="coffee">coffee</span>
<h1 class="font-headline font-bold tracking-tight text-xl text-[#553722] dark:text-stone-100">M Coffee</h1>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-[#553722]">person</span>
</button>
</header>
<main class="pt-24 px-6">
<!-- Header -->
<section class="mb-6">
<h2 class="text-3xl font-black text-primary">Floor Plan</h2>
<p class="text-on-surface-variant">Visual table layout</p>
</section>
<!-- Visual Layout -->
<div id="visual-layout" class="w-full">
<!-- Tables loaded dynamically -->
</div>
</main>
</body></html>
