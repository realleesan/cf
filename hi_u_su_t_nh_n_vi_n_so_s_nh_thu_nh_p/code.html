<html class="light" lang="vi"><head>

<title>M Coffee - Quản lý nhân viên</title>

            -webkit-font-smoothing: antialiased;
        }

            font-family: 'Plus Jakarta Sans', sans-serif;
        }

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#4c4542",

                        "inverse-on-surface": "#f1f1f0",
                        "on-tertiary-fixed": "#201a18",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#2d1604",
                        "secondary-fixed": "#ccebc7",
                        "on-secondary": "#ffffff",
                        "background": "#f9f9f8",
                        "primary-fixed": "#ffdcc6",
                        "on-surface": "#1a1c1c",
                        "on-background": "#1a1c1c",
                        "surface-container-low": "#f4f4f3",
                        "inverse-surface": "#2f3130",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#dadad9",

                        "surface-container-highest": "#e2e2e2",

                        "on-surface-variant": "#50453e",
                        "primary-fixed-dim": "#eabda0",
                        "outline-variant": "#d4c3ba",
                        "primary": "#553722",
                        "on-secondary-fixed-variant": "#334d33",
                        "on-error": "#ffffff",
                        "tertiary": "#443d3a",
                        "secondary": "#4a6549",
                        "secondary-fixed-dim": "#b0cfad",
                        "surface-container-high": "#e8e8e7",
                        "outline": "#82746d",
                        "on-primary-container": "#eec1a4",
                        "surface-bright": "#f9f9f8",
                        "on-primary-fixed-variant": "#5f402a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }

<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<script>
    // Configuration
    // Configuration - Use Supabase client directly
    const api = window.api;
    
    // State
    let staff = [];
    let currentPeriod = 'today';

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadStaff();
        setupEventListeners();
    });

    // Load staff from API
    async function loadStaff() {
        try {
            staff = await api.getStaffEarningsSummary();
            
            renderStaff();
        } catch (err) {
            console.error('Failed to load staff:', err);
            // Fallback
            renderStaffFallback();
        }
    }

    // Render staff cards
    function renderStaff() {
        const container = document.getElementById('staff-grid');
        if (!container) return;
        
        if (staff.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <span class="material-symbols-outlined text-6xl text-on-surface-variant/30">group</span>
                    <p class="mt-4 text-on-surface-variant">No staff found</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = staff.map(member => `
            <div class="group relative bg-surface-container-lowest p-5 rounded-2xl shadow-[0_4px_20px_rgba(80,69,62,0.05)] hover:shadow-[0_8px_30px_rgba(80,69,62,0.1)] transition-all duration-300">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-4">
                        <div class="relative w-14 h-14 rounded-xl overflow-hidden border border-primary-container/10">
                            ${member.photo_url 
                                ? `<img class="w-full h-full object-cover" src="${member.photo_url}" alt="${member.full_name}"/>`
                                : `<div class="w-full h-full bg-primary-container flex items-center justify-center text-white font-bold">${member.full_name.charAt(0)}</div>`
                            }
                        </div>
                        <div>
                            <h3 class="text-base font-headline font-bold text-primary">${member.full_name}</h3>
                            <span class="inline-block px-2 py-0.5 rounded-full bg-secondary-container text-on-secondary-container text-[9px] font-bold uppercase tracking-wider">${member.role}</span>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-primary/30 cursor-pointer" data-icon="more_vert">more_vert</span>
                </div>
                <div class="space-y-3">
                    <div class="p-3 rounded-xl bg-surface-container-low">
                        <p class="text-[10px] font-label font-semibold text-on-surface-variant uppercase tracking-wider mb-0.5">Thu nhập trong kỳ</p>
                        <p class="text-xl font-headline font-extrabold text-primary">$${(member.total_earnings || 0).toFixed(2)}</p>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold px-1">
                            <div class="flex flex-col">
                                <span class="text-on-surface-variant uppercase">Tiền thực thu</span>
                                <span class="text-secondary text-xs">$${(member.total_earnings || 0).toFixed(2)}</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-on-surface-variant uppercase">Tiền Bill</span>
                                <span class="text-primary text-xs">$${(member.total_earnings || 0).toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
                            <div class="h-full bg-secondary rounded-full" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Add "Add Staff" button
        container.innerHTML += `
            <div class="flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-dashed border-outline-variant hover:border-primary/40 hover:bg-surface-container-low/50 transition-all cursor-pointer group h-full min-h-[160px]">
                <div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-2xl text-primary" data-icon="person_add">person_add</span>
                </div>
                <h3 class="text-base font-headline font-bold text-primary">Thêm nhân viên</h3>
            </div>
        `;
    }

    // Render fallback staff (when API not available)
    function renderStaffFallback() {
        const container = document.getElementById('staff-grid');
        container.innerHTML = `
            <div class="group relative bg-surface-container-lowest p-5 rounded-2xl shadow-[0_4px_20px_rgba(80,69,62,0.05)]">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-4">
                        <div class="relative w-14 h-14 rounded-xl bg-primary-container flex items-center justify-center text-white font-bold">A</div>
                        <div>
                            <h3 class="text-base font-headline font-bold text-primary">Loading...</h3>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    // Set period filter
    function setPeriod(period) {
        currentPeriod = period;
        
        document.querySelectorAll('.period-btn').forEach(btn => {
            if (btn.dataset.period === period) {
                btn.className = 'period-btn px-5 py-2 rounded-full bg-secondary text-on-secondary font-label text-xs font-semibold transition-all hover:opacity-90 active:scale-95';
            } else {
                btn.className = 'period-btn px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs font-semibold hover:bg-surface-container-high transition-all active:scale-95';
            }
        });
        
        // Reload with period (future implementation)
        loadStaff();
    }

    // Setup event listeners
    function setupEventListeners() {
        // Orders nav
        const ordersBtn = document.getElementById('orders-nav');
        if (ordersBtn) {
            ordersBtn.onclick = () => window.location.href = '../order_history/code.html';
        }
        
        // Inventory nav
        const inventoryBtn = document.getElementById('inventory-nav');
        if (inventoryBtn) {
            inventoryBtn.onclick = () => window.location.href = '../table_management_1/code.html';
        }
        
        // Settings nav
        const settingsBtn = document.getElementById('settings-nav');
        if (settingsBtn) {
            settingsBtn.onclick = () => {};
        }
    }
</script>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->

</div>
</div>

<main class="pt-24 px-6 max-w-5xl mx-auto">

</section>
<!-- Date Range Filter: Tonal Layering -->
<section class="mb-8">
<div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/10">
<div class="flex flex-col gap-4">
<div class="space-y-0.5">
<p class="font-headline font-bold text-lg text-primary">Khoảng thời gian</p>

</div>
<div class="flex flex-wrap gap-2">
<button onclick="setPeriod('today')" class="period-btn px-5 py-2 rounded-full bg-secondary text-on-secondary font-label text-xs font-semibold transition-all hover:opacity-90 active:scale-95" data-period="today">Hôm nay</button>
<button onclick="setPeriod('week')" class="period-btn px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs font-semibold hover:bg-surface-container-high transition-all active:scale-95" data-period="week">7 ngày qua</button>
<button onclick="setPeriod('month')" class="period-btn px-5 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs font-semibold hover:bg-surface-container-high transition-all active:scale-95" data-period="month">Tháng này</button>
<button class="flex items-center gap-2 px-5 py-2 rounded-full bg-primary-container text-white font-label text-xs font-semibold hover:opacity-90 transition-all active:scale-95">
<span class="material-symbols-outlined text-sm" data-icon="calendar_today">calendar_today</span>
                        Tùy chỉnh
                    </button>
</div>
</div>
</div>
</section>
<!-- Staff List: More compact grid -->
<div id="staff-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Staff will be loaded dynamically -->
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#f9f9f8]/90 dark:bg-stone-950/90 backdrop-blur-xl shadow-[0_-10px_30px_rgba(80,69,62,0.08)] rounded-t-[2.5rem] flex justify-around items-center px-4 pb-6 pt-3">

</a>
<!-- Staff (ACTIVE) -->
