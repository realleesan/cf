            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<script>
    // Configuration - Use Supabase client directly for Vercel deployment
    // No backend needed - frontend calls Supabase directly
    const API_BASE = 'http://localhost:3000/api'; // Kept for local development reference
    
    // Load Supabase client
    const supabaseClient = window.supabase;
    // api will be retrieved locally in functions
    
    // Cart state
    let cart = [];
    let menuData = { categories: [], items: [] };
    let selectedCategory = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        // Check for table ID in URL
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table');
        if (tableId) {
            localStorage.setItem('currentTableId', tableId);
        }
        
        await loadMenu();
        updateTableDisplay();
        
        // Restore cart
        const saved = localStorage.getItem('stitch_cart');
        if (saved) cart = JSON.parse(saved);
        
        setupEventListeners();
        updateCartUI(); // Initial checkout panel render
    });

    function updateTableDisplay() {
        const tableId = localStorage.getItem('currentTableId');
        const display = document.getElementById('current-table-display');
        if (!display) return;

        if (tableId) {
            // Get table number from menuData if possible, or just show ID for now
            // We'll improve this with a fetch if needed
            display.textContent = `Bàn ${tableId}`;
            // If we want real table number, we can fetch all tables once
        } else {
            display.textContent = 'Chưa chọn bàn';
        }
    }

    async function openTableSelector() {
        const modal = document.getElementById('table-selector-modal');
        const content = document.getElementById('table-selector-content');
        const grid = document.getElementById('available-tables-grid');
        
        modal.classList.remove('hidden');
        setTimeout(() => content.classList.remove('translate-y-full'), 10);
        
        grid.innerHTML = '<div class="p-4 text-center text-stone-400">Đang tải bàn trống...</div>';
        
        try {
            const api = window.api;
            const tables = await api.getTables();
            const emptyTables = tables.filter(t => t.status === 'available');
            
            if (emptyTables.length === 0) {
                grid.innerHTML = '<div class="p-10 text-center text-stone-400 flex flex-col items-center gap-3"><span class="material-symbols-outlined text-4xl">event_busy</span><p>Hiện tại không có bàn nào trống</p></div>';
                return;
            }
            
            grid.innerHTML = `
                <div class="grid grid-cols-3 gap-4">
                    ${emptyTables.map(t => `
                        <button onclick="selectTable('${t.id}', '${t.table_number}')" class="aspect-square rounded-2xl bg-white border-2 border-stone-100 flex flex-col items-center justify-center gap-1 active:scale-90 transition-all hover:border-primary/30">
                            <span class="material-symbols-outlined text-stone-400">table_bar</span>
                            <span class="font-black text-xl text-primary">${t.table_number}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        } catch (err) {
            grid.innerHTML = '<div class="p-4 text-center text-red-500">Lỗi tải dữ liệu bàn</div>';
        }
    }

    function selectTable(id, number) {
        localStorage.setItem('currentTableId', id);
        updateTableDisplay();
        closeTableSelector();
        showToast(`Đã chọn Bàn ${number}`);
    }

    function closeTableSelector() {
        const modal = document.getElementById('table-selector-modal');
        const content = document.getElementById('table-selector-content');
        content.classList.add('translate-y-full');
        setTimeout(() => modal.classList.add('hidden'), 300);
    }

    function showToast(message) {
        let toast = document.getElementById('toast-notification');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = 'fixed top-10 left-1/2 -translate-x-1/2 z-[200] bg-primary text-white px-6 py-3 rounded-full font-bold shadow-2xl transition-all opacity-0 pointer-events-none translate-y-[-20px]';
            document.body.appendChild(toast);
        }
        
        toast.textContent = message;
        toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
        toast.classList.add('opacity-100', 'translate-y-0');
        
        setTimeout(() => {
            toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            toast.classList.remove('opacity-100', 'translate-y-0');
        }, 2000);
    }

    // Load menu from API
    async function loadMenu() {
        // Chờ api sẵn sàng nếu load async
        let retryCount = 0;
        while (!window.api && retryCount < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            retryCount++;
        }

        const api = window.api;
        if (!api) {
            console.error('API not ready');
            return;
        }

        try {
            // Fetch categories
            const categories = await api.getCategories();
            
            // Fetch all menu items
            const items = await api.getMenuItems();
            
            menuData = { categories, items };
            
            // Render categories
            renderCategories(categories);
            
            // Render first category items if selectedCategory is not set
            if (categories.length > 0) {
                if (!selectedCategory || !categories.find(c => c.id == selectedCategory)) {
                    selectCategory(categories[0].id);
                } else {
                    selectCategory(selectedCategory);
                }
            }
        } catch (err) {
            console.error('Failed to load menu:', err);
            // Fallback to static data if API not available
            renderStaticMenu();
        }
    }

    // Render categories
    function renderCategories(categories) {
        const nav = document.getElementById('category-nav');
        if (!nav) return;
        
        nav.innerHTML = categories.map((cat, idx) => `
            <button onclick="selectCategory('${cat.id}')" 
                    class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-bold text-sm transition-all ${idx === 0 ? 'bg-secondary text-on-secondary' : 'bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high'}"
                    data-category="${cat.id}">
                ${cat.name}
            </button>
        `).join('');
    }

    // Select category
    function selectCategory(categoryId) {
        selectedCategory = categoryId;
        
        // Update active button
        document.querySelectorAll('.category-btn').forEach(btn => {
            if (btn.dataset.category === categoryId) {
                btn.className = 'category-btn whitespace-nowrap px-6 py-2 rounded-full font-bold text-sm transition-all bg-secondary text-on-secondary';
            } else {
                btn.className = 'category-btn whitespace-nowrap px-6 py-2 rounded-full font-bold text-sm transition-all bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high';
            }
        });
        
        // Render items for category
        const items = menuData.items.filter(item => item.category_id == categoryId);
        renderMenuItems(items);
    }

    // Render menu items
    function renderMenuItems(items) {
        const container = document.getElementById('menu-content');
        if (!container) return;
        
        const category = menuData.categories.find(c => c.id == selectedCategory);
        
        // Check if category has secondary color
        const isSecondary = category && ['NƯỚC ÉP', 'TRÀ TRÁI CÂY', 'SINH TỐ', 'SỮA TƯƠI'].includes(category.name);
        
        let html = `
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-headline text-xl font-extrabold tracking-tight ${isSecondary ? 'text-secondary' : 'text-primary'}">${category?.name || 'Menu'}</h3>
                    <div class="h-[1px] flex-grow ml-4 bg-outline-variant/30"></div>
                </div>
                <div class="${isSecondary ? 'grid grid-cols-1 gap-4' : 'space-y-4'}">
        `;
        
        items.forEach(item => {
            const cartItem = cart.find(c => c.itemId === item.id);
            const actionButtonHTML = cartItem 
                ? `<div class="flex items-center gap-2 bg-stone-100 rounded-full p-1 border border-stone-200">
                       <button onclick="updateCartItem('${item.id}', -1)" class="w-8 h-8 rounded-full flex items-center justify-center text-primary bg-white shadow-[0_2px_4px_rgba(0,0,0,0.05)] active:scale-90 transition-transform font-bold text-lg">-</button>
                       <span class="font-black text-primary w-4 text-center text-sm">${cartItem.quantity}</span>
                       <button onclick="updateCartItem('${item.id}', 1)" class="w-8 h-8 rounded-full flex items-center justify-center text-primary bg-white shadow-[0_2px_4px_rgba(0,0,0,0.05)] active:scale-90 transition-transform font-bold text-lg">+</button>
                   </div>`
                : `<button onclick="addToCart('${item.id}', '${item.name}', ${item.price})" class="w-10 h-10 rounded-full ${isSecondary ? 'bg-secondary' : 'bg-primary-container'} text-white flex items-center justify-center hover:scale-105 active:scale-95 transition-transform">
                       <span class="material-symbols-outlined" data-icon="add">add</span>
                   </button>`;

            if (isSecondary) {
                html += `
                    <div class="flex items-center gap-4 p-4 bg-secondary-container/20 rounded-lg border border-secondary-container/30">
                        <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                            ${item.image_url ? `<img class="w-full h-full object-cover" src="${item.image_url}" alt="${item.name}"/>` : '<div class="w-full h-full flex items-center justify-center text-primary"><span class="material-symbols-outlined">coffee</span></div>'}
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-on-surface text-lg">${item.name}</h4>
                                <span class="font-bold text-secondary">${formatVN(item.price)}</span>
                            </div>
                            <p class="text-xs text-on-secondary-fixed-variant mt-1">${item.description || ''}</p>
                        </div>
                        ${actionButtonHTML}
                    </div>
                `;
            } else {
                html += `
                    <div class="flex items-center gap-4 p-4 bg-surface-container-lowest rounded-lg group transition-all hover:shadow-lg hover:-translate-y-1">
                        <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                            ${item.image_url ? `<img class="w-full h-full object-cover" src="${item.image_url}" alt="${item.name}"/>` : '<div class="w-full h-full flex items-center justify-center text-primary"><span class="material-symbols-outlined">coffee</span></div>'}
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-on-surface text-lg">${item.name}</h4>
                                <span class="font-bold text-primary">${formatVN(item.price)}</span>
                            </div>
                            <p class="text-xs text-on-surface-variant mt-1">${item.description || ''}</p>
                        </div>
                        ${actionButtonHTML}
                    </div>
                `;
            }
        });
        
        html += '</div></section>';
        container.innerHTML = html;
    }

    // Add to cart
    function addToCart(itemId, itemName, price) {
        const existing = cart.find(c => c.itemId === itemId);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ itemId, name: itemName, price: parseFloat(price), quantity: 1 });
        }
        updateCartUI();
    }

    // Update cart item
    function updateCartItem(itemId, delta) {
        const existing = cart.find(c => c.itemId === itemId);
        if (existing) {
            existing.quantity += delta;
            if (existing.quantity <= 0) {
                cart = cart.filter(c => c.itemId !== itemId);
            }
        }
        updateCartUI();
    }

    // Update cart UI
    function updateCartUI() {
        const badge = document.getElementById('cart-badge');
        if (badge) {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            badge.textContent = totalItems > 0 ? totalItems : 'Cart';
        }
        
        // Store cart in localStorage
        localStorage.setItem('stitch_cart', JSON.stringify(cart));
        
        // Re-render currently visible items to show new buttons
        if (selectedCategory) {
            const items = menuData.items.filter(item => item.category_id == selectedCategory);
            renderMenuItems(items);
        }
        
        renderCheckoutPanel();
    }

    // Render Checkout Panel
    function renderCheckoutPanel() {
        const panel = document.getElementById('checkout-panel');
        if (!panel) return;
        
        if (cart.length === 0) {
            panel.classList.add('hidden');
            return;
        }
        panel.classList.remove('hidden');

        const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;
        document.getElementById('co-subtotal').textContent = formatVN(subtotal);
        document.getElementById('co-tax').textContent = formatVN(tax);
        document.getElementById('co-total').textContent = formatVN(total);
    }

    function formatVN(price) {
        let p = parseFloat(price) || 0;
        if (p >= 1000) p = p / 1000;
        return p.toLocaleString('vi-VN', {maximumFractionDigits: 1}) + 'k VNĐ';
    }

    async function confirmOrder() {
        if (cart.length === 0) return;
        
        const tableId = localStorage.getItem('currentTableId');
        const orderType = tableId ? 'dine-in' : 'takeaway';

        const btn = document.getElementById('co-submit-btn');
        const original = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING';
        btn.disabled = true;

        try {
            const api = window.api;
            await api.createOrder({
                table_id: tableId || null,
                order_type: orderType,
                items: cart.map(i => ({ menu_item_id: i.itemId, quantity: i.quantity, price: i.price })),
                special_instructions: document.getElementById('co-instructions').value
            });
            
            cart = [];
            localStorage.removeItem('stitch_cart');
            
            window.location.href = '../kitchen_queue/code.html';
        } catch (err) {
            console.error(err);
            btn.innerHTML = 'ERROR - RETRY';
            btn.disabled = false;
            setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2000);
        }
    }

    // Show toast notification
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-32 left-1/2 -translate-x-1/2 bg-primary-container text-white px-6 py-3 rounded-full shadow-lg z-50 font-bold animate-fade-in';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Setup event listeners
    function setupEventListeners() {
        // Cart navigation (scroll to checkout panel)
        const cartBtn = document.getElementById('cart-nav-btn');
        if (cartBtn) {
            cartBtn.onclick = () => {
                const panel = document.getElementById('checkout-panel');
                if (panel && cart.length > 0) {
                    panel.scrollIntoView({ behavior: 'smooth' });
                } else {
                    showToast('Your basket is empty');
                }
            };
        }
        
        // Kitchen navigation
        const kitchenBtn = document.getElementById('kitchen-nav-btn');
        if (kitchenBtn) {
            kitchenBtn.onclick = () => window.location.href = '../kitchen_queue/code.html';
        }
        
        // History navigation
        const historyBtn = document.getElementById('history-nav-btn');
        if (historyBtn) {
            historyBtn.onclick = () => window.location.href = '../order_history/code.html';
        }
    }

    // Fallback static menu rendering
    function renderStaticMenu() {
        const container = document.getElementById('menu-content');
        container.innerHTML = `
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-headline text-xl font-extrabold tracking-tight text-primary">CAFÉ</h3>
                    <div class="h-[1px] flex-grow ml-4 bg-outline-variant/30"></div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-center gap-4 p-4 bg-surface-container-lowest rounded-lg">
                        <div class="w-20 h-20 rounded-lg bg-surface-container flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary">coffee</span>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-on-surface text-lg">Loading...</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        `;
    }
</script>
</head>

            <div class="flex items-center gap-3">
                <button onclick="toggleMenuManagerView('add')" id="mm-back-btn" class="hidden w-10 h-10 rounded-full bg-surface-container flex items-center justify-center transition-colors hover:bg-surface-container-high"><span class="material-symbols-outlined">arrow_back</span></button>

        <!-- Add View -->
        <div id="mm-add-view" class="flex-1 flex flex-col overflow-y-auto bg-surface pb-32">

                        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Loại đồ</label>

                        </select>
                        <input type="text" id="new-item-category-custom" placeholder="Nhập tên loại đồ mới" class="w-full bg-surface-container rounded-xl px-4 py-3 border-none focus:ring-2 focus:ring-primary font-medium mt-2 hidden">
                    </div>
                    <div class="flex-[1.5]">

                    <div class="flex items-end flex-none">
                        <button onclick="addNewMenuItem()" class="h-[48px] px-6 rounded-xl bg-primary text-white font-bold hover:bg-[#6f4e37] transition-colors w-full md:w-auto">THÊM MỚI</button>

            <div class="px-6">
                <button onclick="toggleMenuManagerView('list')" class="w-full py-4 rounded-2xl bg-secondary/10 text-secondary font-black text-lg hover:bg-secondary/20 transition-colors flex items-center justify-center gap-2 border-2 border-secondary/20">

        </div>

<script>
    /* --- MENU MANAGEMENT LOGIC --- */
    let manageCategories = [];
    let manageItems = [];

    async function openMenuManager() {
        const modal = document.getElementById('menu-manager-modal');
        const content = document.getElementById('menu-manager-content');
        toggleMenuManagerView('add');
        modal.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('translate-y-full');
        }, 10);
        await loadManageMenuData();
    }

    function toggleMenuManagerView(view) {
        const addView = document.getElementById('mm-add-view');
        const listView = document.getElementById('mm-list-view');
        const backBtn = document.getElementById('mm-back-btn');
        const title = document.getElementById('mm-title');
        
        if (view === 'list') {
            addView.classList.add('hidden');
            listView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            title.innerText = 'Danh sách Món';
        } else {
            listView.classList.add('hidden');
            addView.classList.remove('hidden');
            backBtn.classList.add('hidden');
            title.innerText = 'Quản lý Menu';
        }
    }

    function closeMenuManager() {
        const modal = document.getElementById('menu-manager-modal');
        const content = document.getElementById('menu-manager-content');
        content.classList.add('translate-y-full');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    async function loadManageMenuData() {
        try {
            manageCategories = await window.api.getCategories() || [];
            manageItems = await window.api.getMenuItems() || [];
            updateCategorySelectOptions();
            renderManageItems();
        } catch (err) {
            console.error('Lỗi khi tải dữ liệu menu', err);
        }
    }

    function handleCategorySelectChange(selectElem) {
        const customInput = document.getElementById('new-item-category-custom');
        if (selectElem.value === '_new_') {
            customInput.classList.remove('hidden');
            customInput.focus();
        } else {
            customInput.classList.add('hidden');
            customInput.value = '';
        }
    }

    function updateCategorySelectOptions() {
        const select = document.getElementById('new-item-category');
        select.innerHTML = manageCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('') +
                           `<option value="_new_">+ Thêm loại mới...</option>`;
        
        const customInput = document.getElementById('new-item-category-custom');
        customInput.classList.add('hidden');
        customInput.value = '';
        
        if(manageCategories.length === 0) {
            select.value = '_new_';
            handleCategorySelectChange(select);
        }
    }

    function renderManageItems() {
        const list = document.getElementById('manage-items-list');
        if(manageItems.length === 0) {
            list.innerHTML = `<div class="p-8 text-center text-stone-400 font-medium bg-surface-container-low rounded-2xl">Chưa có món nào. Hãy thêm món mới.</div>`;
            return;
        }

        const sortedItems = [...manageItems].sort((a,b) => {
            const catA = manageCategories.find(c => c.id == a.category_id)?.name || '';
            const catB = manageCategories.find(c => c.id == b.category_id)?.name || '';
            return catA.localeCompare(catB) || a.name.localeCompare(b.name);
        });
        
        list.innerHTML = sortedItems.map(item => {
            const catOptions = manageCategories.map(c => `<option value="${c.id}" ${c.id == item.category_id ? 'selected' : ''}>${c.name}</option>`).join('');
            
            return `
            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 p-4 relative flex flex-col gap-3 transform transition-all" id="mi-row-${item.id}">
                <div class="grid grid-cols-12 gap-2 md:gap-3">
                    <div class="col-span-5 md:col-span-3">
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-wider pl-1 mb-1 block truncate">Loại</label>
                        <select class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-white rounded-xl px-2 sm:px-3 py-2 transition-all text-xs sm:text-sm block focus:outline-none focus:ring-2 focus:ring-primary/20" id="edit-mi-cat-${item.id}">
                            ${catOptions}
                        </select>
                    </div>
                    <div class="col-span-7 md:col-span-4">
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-wider pl-1 mb-1 block truncate">Tên đồ</label>
                        <input type="text" class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-white rounded-xl px-2 sm:px-3 py-2 transition-all text-sm sm:text-base font-black text-primary block focus:outline-none focus:ring-2 focus:ring-primary/20 truncate" value="${item.name}" id="edit-mi-name-${item.id}">
                    </div>
                    <div class="col-span-4 md:col-span-2">
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-wider pl-1 mb-1 block truncate">Giá</label>
                        <input type="number" min="0" class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-white rounded-xl px-2 sm:px-3 py-2 transition-all text-sm sm:text-base font-black text-primary text-center block focus:outline-none focus:ring-2 focus:ring-primary/20" value="${item.price || 0}" id="edit-mi-price-${item.id}">
                    </div>
                    <div class="col-span-8 md:col-span-3">
                        <label class="text-[10px] font-bold text-stone-400 uppercase tracking-wider pl-1 mb-1 block truncate">Ảnh (URL)</label>
                        <input type="text" class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-white rounded-xl px-2 sm:px-3 py-2 transition-all text-xs sm:text-sm truncate block focus:outline-none focus:ring-2 focus:ring-primary/20" value="${item.image_url || ''}" id="edit-mi-image-${item.id}" placeholder="URL">
                    </div>
                </div>
                
                <div class="flex gap-2 justify-end mt-1 pt-3 border-t border-stone-50">
                    <button onclick="saveManagedMenuItem('${item.id}')" class="px-5 py-2 rounded-xl bg-secondary/10 text-secondary font-black text-sm hover:bg-secondary/20 transition-colors">LƯU</button>
                    <button onclick="deleteManagedMenuItem('${item.id}')" class="px-5 py-2 rounded-xl bg-red-50 text-red-600 font-black text-sm hover:bg-red-100 transition-colors">XOÁ</button>
                </div>
            </div>
        `}).join('');
    }

    async function addNewMenuItem() {
        const nameInput = document.getElementById('new-item-name');
        const priceInput = document.getElementById('new-item-price');
        const imageInput = document.getElementById('new-item-image');
        const select = document.getElementById('new-item-category');
        const customInput = document.getElementById('new-item-category-custom');
        
        const name = nameInput.value.trim();
        const price = parseFloat(priceInput.value) || 0;
        const imageUrl = imageInput.value.trim();
        let categoryId = select.value;
        
        if (!name) {
            alert('Vui lòng nhập tên món!');
            return;
        }
        if (categoryId === '_new_' && !customInput.value.trim()) {
            alert('Vui lòng nhập tên loại đồ mới!');
            return;
        }
        
        try {
            if (categoryId === '_new_') {
                const newCatName = customInput.value.trim();
                const newCat = await window.api.addCategory({ name: newCatName, is_active: true });
                manageCategories.push(newCat);
                categoryId = newCat.id;
            }
            
            const newItem = await window.api.addMenuItem({
                category_id: categoryId,
                name: name,
                price: price,
                image_url: imageUrl,
                is_available: true
            });
            
            manageItems.push(newItem);
            menuData.items.push(newItem);
            
            // Clear form
            nameInput.value = '';
            priceInput.value = '';
            imageInput.value = '';
            
            // Refresh UI instantly
            updateCategorySelectOptions();
            renderManageItems();
            if (selectedCategory) selectCategory(selectedCategory);
            
        } catch (err) {
            console.error(err);
            alert('Có lỗi xảy ra khi thêm món mới!');
        }
    }

    async function saveManagedMenuItem(id) {
        const catInput = document.getElementById(`edit-mi-cat-${id}`);
        const nameInput = document.getElementById(`edit-mi-name-${id}`);
        const priceInput = document.getElementById(`edit-mi-price-${id}`);
        const imageInput = document.getElementById(`edit-mi-image-${id}`);
        
        const newCatId = catInput.value;
        const newName = nameInput.value.trim();
        const newPrice = parseFloat(priceInput.value) || 0;
        const newImage = imageInput.value.trim();
        
        if (!newName) {
            alert('Tên đồ không được để trống!');
            return;
        }
        
        try {
            const updatedItem = await window.api.updateMenuItem(id, {
                category_id: newCatId,
                name: newName,
                price: newPrice,
                image_url: newImage
            });
            
            const index = manageItems.findIndex(i => i.id == id);
            
            if(index !== -1 && updatedItem) manageItems[index] = updatedItem;
            
            const mdIndex = menuData.items.findIndex(i => i.id == id);
            if (mdIndex !== -1 && updatedItem) menuData.items[mdIndex] = updatedItem;
            
            renderManageItems();
            if (selectedCategory) selectCategory(selectedCategory);
            
            // small visual feedback
            const row = document.getElementById(`mi-row-${id}`);
            if (row) {
                const origBg = row.style.backgroundColor;
                row.style.backgroundColor = '#ccebc7';
                setTimeout(() => row.style.backgroundColor = origBg, 500);
            }
        } catch (err) {
            console.error(err);
            alert('Có lỗi xảy ra khi lưu thay đổi!');
        }
    }

    async function deleteManagedMenuItem(id) {
        if(!confirm('Bạn có chắc chắn muốn xoá món này không? Không thể hoàn tác.')) return;
        try {
            await window.api.deleteMenuItem(id);
            manageItems = manageItems.filter(i => i.id != id);
            menuData.items = menuData.items.filter(i => i.id != id);
            
            renderManageItems();
            if (selectedCategory) selectCategory(selectedCategory);
        } catch (err) {
            console.error(err);
            alert('Không thể xoá món này (có thể do món đã có trong hoá đơn trc đó). Vui lòng ẩn món thay vì xoá!');
        }
    }
</script>
