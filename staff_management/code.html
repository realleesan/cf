<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>M Coffee - Quản lý Nhân sự</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#553722",
                        secondary: "#4a6549",
                        surface: "#f9f9f8",
                        'surface-container': "#eeeeed",
                        'on-surface-variant': "#50453e",
                    },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/10">
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-surface/80 backdrop-blur-xl border-b border-stone-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">badge</span>
            </div>
            <h1 class="font-headline font-black tracking-tight text-2xl text-primary">Nhân sự</h1>
        </div>
        <div class="flex items-center gap-3">
            <input type="date" id="filter-date" onchange="render()" class="bg-white border-none rounded-2xl px-4 py-2 text-xs font-black text-primary shadow-sm outline-none focus:ring-2 focus:ring-primary/20">
            <button onclick="openStaffModal('add')" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 active:scale-95 transition-transform">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
    </header>

    <main class="pt-28 px-6 pb-40 max-w-5xl mx-auto">
        <section class="mb-10">
            <h2 class="text-4xl font-black text-primary leading-tight mb-2">Đội ngũ<br>Nhân viên</h2>
            <p class="text-on-surface-variant font-medium text-sm">Quản lý đội ngũ và theo dõi doanh thu theo ngày.</p>
        </section>

        <div id="staff-grid" class="flex flex-col gap-4">
            <!-- Staff cards will be populated here -->
            <div class="py-20 text-center text-stone-300">
                <div class="animate-spin h-8 w-8 border-4 border-primary border-t-transparent rounded-full mx-auto mb-4"></div>
                <p>Đang tải dữ liệu nhân sự...</p>
            </div>
        </div>
    </main>

    <!-- CRUD Modal -->
    <div id="staff-modal" class="fixed inset-0 z-[200] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeStaffModal()"></div>
        <div class="absolute bottom-0 left-0 w-full bg-surface rounded-t-[3rem] shadow-2xl flex flex-col max-h-[90vh] transform transition-transform translate-y-full" id="modal-content">
            <div class="p-8 border-b border-stone-100 flex justify-between items-center">
                <h3 id="modal-title" class="text-2xl font-black text-primary">Thêm nhân viên</h3>
                <button onclick="closeStaffModal()" class="w-12 h-12 rounded-full bg-stone-100 flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="p-8 space-y-6 overflow-y-auto">
                <div class="flex flex-col items-center mb-6">
                    <div class="relative group cursor-pointer" onclick="document.getElementById('staff-avatar-file').click()">
                        <div id="avatar-preview" class="w-24 h-24 rounded-[2rem] bg-stone-100 border-2 border-dashed border-stone-200 flex items-center justify-center overflow-hidden">
                            <span class="material-symbols-outlined text-stone-300 text-4xl">person</span>
                        </div>
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-[2rem] transition-opacity">
                            <span class="material-symbols-outlined text-white">upload</span>
                        </div>
                    </div>
                    <input type="file" id="staff-avatar-file" class="hidden" accept="image/*" onchange="previewAvatar(event)">
                    <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mt-3">Ảnh đại diện</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 px-1">Tên đầy đủ</label>
                        <input type="text" id="staff-name" class="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-bold" placeholder="Vd: Nguyễn Văn A">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 px-1">Avatar URL (Nếu có)</label>
                        <input type="text" id="staff-avatar-url" class="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-bold" placeholder="https://...">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 px-1">Chức vụ</label>
                        <select id="staff-role" class="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-bold">
                            <option value="Staff">Phục vụ</option>
                            <option value="Cashier">Thu ngân</option>
                            <option value="Manager">Quản lý</option>
                            <option value="Chef">Đầu bếp</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 px-1">Số điện thoại</label>
                            <input type="tel" id="staff-phone" class="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-bold" placeholder="090...">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-400 uppercase tracking-widest mb-2 px-1">Mã NV (Tùy chọn)</label>
                            <input type="text" id="staff-eid" class="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none font-bold" placeholder="NV001">
                        </div>
                    </div>
                </div>
                <div class="pt-6 flex gap-3">
                    <button id="modal-submit" onclick="saveStaff()" class="flex-1 py-5 rounded-[2rem] bg-primary text-white font-black text-lg shadow-xl shadow-primary/20 active:scale-95 transition-transform uppercase tracking-widest">Lưu thông tin</button>
                </div>
                <button id="modal-delete" onclick="handleDeleteStaff()" class="w-full py-4 text-red-500 font-bold text-sm uppercase tracking-widest hidden">Xóa nhân viên này</button>
            </div>
        </div>
    </div>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-[100] flex justify-between items-center px-2 pb-6 pt-3 bg-white/95 backdrop-blur-2xl rounded-t-[2.5rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)] border-t border-stone-100">
        <div onclick="window.location.href='../m_coffee_visual_table_layout/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">grid_view</span>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black mt-1">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">menu_book</span>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black mt-1">Menu</span>
        </div>
        <div onclick="window.location.href='../order_view/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">payments</span>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black mt-1">Payment</span>
        </div>
        <div class="flex flex-col items-center justify-center flex-1 min-w-0">
            <div class="bg-primary text-white rounded-xl p-2 w-10 h-10 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">badge</span>
            </div>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black text-primary mt-1">Staff</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">cooking</span>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black mt-1">Kitchen</span>
        </div>
        <div onclick="window.location.href='../order_history/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">history</span>
            <span class="font-body text-[8px] uppercase tracking-tighter font-black mt-1">History</span>
        </div>
    </nav>

    <script>
        let staff = [];
        let orders = [];
        let selectedStaffId = null;
        let avatarFile = null;

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filter-date').value = today;
            initialize();
        });

        async function initialize() {
            if (!window.api) return setTimeout(initialize, 500);
            try {
                staff = await window.api.getStaff();
                orders = await window.api.getOrderHistory();
                render();
            } catch (err) { console.error(err); }
        }

        function calculateEarnings(staffId, dateStr) {
            return orders
                .filter(o => {
                    const orderDate = new Date(o.created_at).toISOString().split('T')[0];
                    return o.staff_id === staffId && o.status === 'completed' && orderDate === dateStr;
                })
                .reduce((sum, o) => sum + (parseFloat(o.total_amount) || 0), 0);
        }

        function formatVN(price) {
            return (price || 0).toLocaleString('vi-VN') + 'đ';
        }

        function render() {
            const container = document.getElementById('staff-grid');
            const selectedDate = document.getElementById('filter-date').value;
            
            if (staff.length === 0) {
                container.innerHTML = '<div class="py-20 text-center text-stone-300">Chưa có nhân viên. Nhấn + để thêm.</div>';
                return;
            }

            container.innerHTML = staff.map(s => {
                const earnings = calculateEarnings(s.id, selectedDate);
                const avatar = s.avatar_url ? `<img src="${s.avatar_url}" class="w-full h-full object-cover">` : `<span class="material-symbols-outlined text-primary/40 text-2xl">person</span>`;
                
                return `
                    <div onclick="openStaffModal('edit', '${s.id}')" class="bg-white rounded-[2rem] p-6 border border-stone-100 shadow-sm flex items-center justify-between hover:shadow-md transition-all cursor-pointer group active:scale-[0.98]">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-[1.5rem] bg-stone-50 flex items-center justify-center overflow-hidden border border-stone-100 shadow-inner">
                                ${avatar}
                            </div>
                            <div>
                                <h3 class="font-black text-primary text-lg leading-tight">${s.full_name}</h3>
                                <p class="text-[10px] text-stone-400 font-bold uppercase tracking-widest mt-1">${s.role}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-stone-400 font-black uppercase tracking-widest leading-none mb-1">Thu hộ ${selectedDate === new Date().toISOString().split('T')[0] ? 'Hôm nay' : selectedDate}</p>
                            <p class="text-xl font-black text-secondary">${formatVN(earnings)}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                avatarFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatar-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function openStaffModal(mode, id = null) {
            selectedStaffId = id;
            avatarFile = null;
            const modal = document.getElementById('staff-modal');
            const content = document.getElementById('modal-content');
            const title = document.getElementById('modal-title');
            const deleteBtn = document.getElementById('modal-delete');
            const preview = document.getElementById('avatar-preview');

            // Reset
            document.getElementById('staff-name').value = '';
            document.getElementById('staff-role').value = 'Staff';
            document.getElementById('staff-phone').value = '';
            document.getElementById('staff-eid').value = '';
            document.getElementById('staff-avatar-url').value = '';
            document.getElementById('staff-avatar-file').value = '';
            preview.innerHTML = `<span class="material-symbols-outlined text-stone-300 text-4xl">person</span>`;

            if (mode === 'edit' && id) {
                const s = staff.find(x => x.id === id);
                if (s) {
                    title.textContent = 'Chỉnh sửa nhân viên';
                    document.getElementById('staff-name').value = s.full_name;
                    document.getElementById('staff-role').value = s.role;
                    document.getElementById('staff-phone').value = s.phone || '';
                    document.getElementById('staff-eid').value = s.employee_id || '';
                    document.getElementById('staff-avatar-url').value = s.avatar_url || '';
                    if (s.avatar_url) {
                        preview.innerHTML = `<img src="${s.avatar_url}" class="w-full h-full object-cover">`;
                    }
                    deleteBtn.classList.remove('hidden');
                }
            } else {
                title.textContent = 'Thêm nhân viên mới';
                deleteBtn.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
        }

        function closeStaffModal() {
            const modal = document.getElementById('staff-modal');
            const content = document.getElementById('modal-content');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function saveStaff() {
            const name = document.getElementById('staff-name').value;
            if (!name) return alert('Vui lòng nhập tên');

            const submitBtn = document.getElementById('modal-submit');
            const oldText = submitBtn.textContent;
            submitBtn.textContent = 'Đang xử lý...';
            submitBtn.disabled = true;

            try {
                let avatarUrl = document.getElementById('staff-avatar-url').value;

                if (avatarFile) {
                    avatarUrl = await window.api.uploadFile(avatarFile);
                }

                const data = {
                    full_name: name,
                    role: document.getElementById('staff-role').value,
                    phone: document.getElementById('staff-phone').value,
                    employee_id: document.getElementById('staff-eid').value,
                    avatar_url: avatarUrl
                };

                if (selectedStaffId) {
                    await window.api.updateStaff(selectedStaffId, data);
                } else {
                    await window.api.addStaff(data);
                }
                closeStaffModal();
                await initialize();
            } catch (err) { alert('Lỗi: ' + err.message); }
            
            submitBtn.textContent = oldText;
            submitBtn.disabled = false;
        }

        async function handleDeleteStaff() {
            if (!selectedStaffId) return;
            if (confirm('Bạn có chắc chắn muốn xóa nhân viên này?')) {
                try {
                    await window.api.deleteStaff(selectedStaffId);
                    closeStaffModal();
                    await initialize();
                } catch (err) { alert('Lỗi: ' + err.message); }
            }
        }
    </script>
</body>
</html>
