<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>M Coffee - Lịch sử Đơn hàng</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#553722",
                        secondary: "#4a6549",
                        surface: "#f9f9f8",
                        'surface-container': "#eeeeed",
                        'on-surface-variant': "#50453e",
                    },
                    borderRadius: { '2xl': '1.5rem', '3xl': '2rem' }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/10">
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-surface/80 backdrop-blur-xl border-b border-stone-100">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-secondary flex items-center justify-center shadow-lg shadow-secondary/20">
                <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">history</span>
            </div>
            <h1 class="font-headline font-black tracking-tight text-2xl text-primary">Lịch sử</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="refresh-indicator" class="material-symbols-outlined text-on-surface-variant animate-spin hidden">sync</span>
            <div class="w-10 h-10 rounded-full bg-stone-200 overflow-hidden">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqfvmUcrMQnYTB2-JGJ6sI67JUbLc1AGW8gNhRoaTCOCDvpYdD61dNJuUfIQ72IC4hFm8FqOS8Vx0ftr1mI8uqL2791b2k22LXPOqJOuQjfc802Ux77TF5Fndtn0n-smVWFhiz5QHdcRS0umJFsgxGqhTTJEAQkb-1ewxhZy3eEfHYHPbZsETqpz3weYRA-97gPLH7K1w-IBaJT86o17nDQPApXRsEnii1FbKeiEYCvLXvqos9-cITwET5ZjXg3b6KZ6WMbVlDScmX" alt="User">
            </div>
        </div>
    </header>

    <main class="pt-28 px-6 pb-40 max-w-5xl mx-auto">
        <section class="mb-10">
            <h2 class="text-4xl font-black text-primary leading-tight mb-2">Nhật ký<br>Hoạt động</h2>
            <p class="text-on-surface-variant font-medium text-sm">Toàn bộ hành trình đặt món và thu ngân.</p>
        </section>

        <!-- Stats Overview -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-secondary p-6 rounded-3xl text-white shadow-xl shadow-secondary/20">
                <p class="text-[10px] font-black opacity-60 uppercase tracking-widest mb-1">Doanh thu hôm nay</p>
                <p id="today-revenue" class="text-4xl font-black">0k</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">Đơn hàng hôm nay</p>
                <p id="today-orders" class="text-4xl font-black text-primary">0</p>
            </div>
        </section>

        <!-- Filter Row -->
        <section class="flex gap-2 mb-6 overflow-x-auto hide-scrollbar pb-2">
            <button onclick="setFilter('all')" class="filter-btn shrink-0 px-6 py-3 rounded-full bg-primary text-white font-black text-[10px] uppercase tracking-widest transition-all" data-filter="all">Tất cả</button>
            <button onclick="setFilter('pending')" class="filter-btn shrink-0 px-6 py-3 rounded-full bg-white border border-stone-100 text-on-surface-variant font-black text-[10px] uppercase tracking-widest hover:border-primary transition-all" data-filter="pending">Đang đợi</button>
            <button onclick="setFilter('preparing')" class="filter-btn shrink-0 px-6 py-3 rounded-full bg-white border border-stone-100 text-on-surface-variant font-black text-[10px] uppercase tracking-widest hover:border-primary transition-all" data-filter="preparing">Đang làm</button>
            <button onclick="setFilter('ready')" class="filter-btn shrink-0 px-6 py-3 rounded-full bg-white border border-stone-100 text-on-surface-variant font-black text-[10px] uppercase tracking-widest hover:border-primary transition-all" data-filter="ready">Chờ trả</button>
            <button onclick="setFilter('completed')" class="filter-btn shrink-0 px-6 py-3 rounded-full bg-white border border-stone-100 text-on-surface-variant font-black text-[10px] uppercase tracking-widest hover:border-primary transition-all" data-filter="completed">Đã Xong</button>
        </section>

        <!-- Orders Grid -->
        <div id="orders-list" class="space-y-4">
            <!-- Orders populated dynamically -->
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-[100] flex justify-between items-center px-2 pb-6 pt-3 bg-white/95 backdrop-blur-2xl rounded-t-[2.5rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)] border-t border-stone-100 dark:border-stone-800">
        <div onclick="window.location.href='../m_coffee_visual_table_layout/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">table_restaurant</span>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black mt-1">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">menu_book</span>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black mt-1">Menu</span>
        </div>
        <div onclick="window.location.href='../order_view/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">payments</span>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black mt-1">Payment</span>
        </div>
        <div onclick="window.location.href='../staff_management/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">badge</span>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black mt-1">Staff</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center flex-1 min-w-0 opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-xl">cooking</span>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black mt-1">Kitchen</span>
        </div>
        <div class="flex flex-col items-center justify-center flex-1 min-w-0">
            <div class="bg-primary text-white rounded-xl p-2 w-10 h-10 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">history</span>
            </div>
            <span class="font-manrope text-[8px] uppercase tracking-tighter font-black text-primary mt-1">History</span>
        </div>
    </nav>

    <script>
        let orders = [];
        let currentFilter = 'all';
        let staff = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await initialize();
            setInterval(initialize, 10000);
        });

        async function initialize() {
            if (!window.api) {
                setTimeout(initialize, 500);
                return;
            }
            document.getElementById('refresh-indicator').classList.remove('hidden');
            try {
                orders = await window.api.getOrderHistory();
                staff = await window.api.getStaff();
                render();
            } catch (err) { console.error(err); }
            document.getElementById('refresh-indicator').classList.add('hidden');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('bg-primary', 'text-white');
                    btn.classList.remove('bg-white', 'text-on-surface-variant', 'border-stone-100');
                } else {
                    btn.classList.remove('bg-primary', 'text-white');
                    btn.classList.add('bg-white', 'text-on-surface-variant', 'border-stone-100');
                }
            });
            render();
        }

        function render() {
            const list = document.getElementById('orders-list');
            const today = new Date().toLocaleDateString();
            const todayOrders = orders.filter(o => new Date(o.created_at).toLocaleDateString() === today);
            const totalRevenue = todayOrders.filter(o => o.status === 'completed').reduce((sum, o) => sum + (o.total_amount || 0), 0);

            document.getElementById('today-orders').textContent = todayOrders.length;
            document.getElementById('today-revenue').textContent = `${Math.round(totalRevenue / 1000)}k VNĐ`;

            const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);

            list.innerHTML = filtered.map(o => {
                const date = new Date(o.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const tableNum = o.tables?.table_number || 'Takeaway';
                const staffName = o.staff_id ? (staff.find(s => s.id === o.staff_id)?.full_name || 'N/A') : null;

                let statusText = 'Mới Đặt';
                let statusClass = 'bg-stone-100 text-stone-600';
                if (o.status === 'preparing') { statusText = 'Đang làm'; statusClass = 'bg-blue-100 text-blue-600'; }
                if (o.status === 'ready') { statusText = 'Chờ trả'; statusClass = 'bg-orange-100 text-orange-600'; }
                if (o.status === 'completed') { statusText = 'Hoàn tất'; statusClass = 'bg-green-100 text-green-600'; }

                return `
                    <div class="bg-white rounded-3xl p-6 border border-stone-100 shadow-sm flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-stone-50 text-primary flex items-center justify-center font-black text-xl">
                                    ${tableNum.replace('Bàn ', '')}
                                </div>
                                <div>
                                    <h3 class="font-black text-primary">#${o.order_number}</h3>
                                    <p class="text-[10px] text-stone-400 font-bold uppercase tracking-widest">${date}</p>
                                </div>
                            </div>
                            <span class="${statusClass} text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${statusText}</span>
                        </div>
                        
                        <div class="text-sm font-medium text-on-surface-variant line-clamp-2">
                            ${o.order_items?.map(i => `${i.quantity}x ${i.menu_items?.name}`).join(', ') || 'Không có món'}
                        </div>

                        <div class="pt-4 border-t border-stone-50 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-stone-300 font-bold uppercase mb-1">Tổng cộng</p>
                                <p class="font-black text-primary">${(o.total_amount || 0).toLocaleString()}đ</p>
                            </div>
                            <div class="text-right">
                                ${staffName ? `
                                    <p class="text-[10px] text-stone-300 font-bold uppercase mb-1">Thu ngân</p>
                                    <div class="flex items-center gap-2 justify-end">
                                        <span class="text-xs font-bold text-primary">${staffName}</span>
                                        <div class="w-5 h-5 rounded-full bg-primary/10 flex items-center justify-center">
                                            <span class="material-symbols-outlined text-[14px]">badge</span>
                                        </div>
                                    </div>
                                ` : `
                                    <button onclick="deleteOrder('${o.id}', '${o.table_id}')" class="p-2 text-stone-300 hover:text-red-500 transition-colors">
                                        <span class="material-symbols-outlined">delete</span>
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="py-20 text-center text-stone-300">Không có đơn hàng nào</div>';
        }

        async function deleteOrder(orderId, tableId) {
            if (!confirm('Xóa đơn hàng này và giải phóng bàn?')) return;
            try {
                await window.api.deleteOrder(orderId, tableId);
                await initialize();
            } catch (err) { alert('Lỗi xóa đơn: ' + err.message); }
        }
    </script>
</body>
</html>
