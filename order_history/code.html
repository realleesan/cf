<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script>
    // Configuration
    // Configuration - Use Supabase client directly
    const api = window.api;
    
    // State
    let orders = [];
    let currentFilter = 'all';

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadOrders();
        setupEventListeners();
    });

    // Load orders from API
    async function loadOrders() {
        let retryCount = 0;
        while (!window.api && retryCount < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            retryCount++;
        }
        const api = window.api;
        if (!api) return;

        try {
            orders = await api.getOrderHistory();
            
            renderOrders();
            updateStats();
        } catch (err) {
            console.error('Failed to load orders:', err);
        }
    }

    // Update statistics
    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const todayOrders = orders.filter(o => o.status === 'completed' && o.created_at && o.created_at.startsWith(today));
        
        const totalRevenue = todayOrders.reduce((sum, o) => sum + parseFloat(o.total_amount || 0), 0);
        const totalOrders = todayOrders.length;
        
        document.getElementById('today-revenue').textContent = `$${totalRevenue.toFixed(2)}`;
        document.getElementById('today-orders').textContent = totalOrders;
    }

    // Render orders
    function renderOrders() {
        const container = document.getElementById('orders-list');
        if (!container) return;
        
        let filteredOrders = orders;
        if (currentFilter !== 'all') {
            filteredOrders = orders.filter(o => o.status === currentFilter);
        }
        
        if (filteredOrders.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12 col-span-full">
                    <span class="material-symbols-outlined text-6xl text-on-surface-variant/30">receipt_long</span>
                    <p class="mt-4 text-on-surface-variant">No orders found</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filteredOrders.map(order => {
            const statusColor = getStatusColor(order.status);
            const time = formatTime(order.updated_at || order.created_at || new Date());
            
            return `
                <div class="glass-card bg-white/70 dark:bg-stone-900/70 rounded-3xl p-6 border border-white/20 shadow-lg hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-bold text-on-surface-variant/60 uppercase tracking-widest">Order</span>
                            <h3 class="font-headline text-2xl font-black text-primary">#${order.order_number}</h3>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${order.status.toUpperCase()}</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between">
                            <span class="text-sm text-on-surface-variant">Table</span>
                            <span class="text-sm font-bold">${order.order_type === 'takeaway' ? 'Takeaway' : `Table ${order.tables?.table_number || '?'}`}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-on-surface-variant">Served by</span>
                            <span class="text-sm font-bold">${order.staff?.full_name || 'Staff'}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-on-surface-variant">Time</span>
                            <span class="text-sm font-bold">${time}</span>
                        </div>
                    </div>
                    <div class="mt-2 space-y-2 border-t border-outline-variant/10 pt-2 text-sm text-on-surface">
                        ${order.order_items ? order.order_items.map(i => `<div class="flex justify-between"><span class="font-bold">${i.quantity}x ${i.menu_items?.name || ''}</span></div>`).join('') : ''}
                    </div>
                    <div class="pt-4 border-t border-outline-variant/20 flex justify-between items-center">
                        <span class="text-lg font-extrabold">Total</span>
                        <span class="text-xl font-black text-primary">$${parseFloat(order.total_amount || 0).toFixed(2)}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Get status color
    function getStatusColor(status) {
        switch(status) {
            case 'completed':
                return 'bg-secondary-container text-on-secondary-container';
            case 'cancelled':
                return 'bg-error-container text-on-error-container';
            default:
                return 'bg-surface-container-high text-on-surface-variant';
        }
    }

    // Format time
    function formatTime(dateString) {
        const date = new Date(dateString);
        return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    // Set filter
    function setFilter(filter) {
        currentFilter = filter;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === filter) {
                btn.className = 'filter-btn px-4 py-2 rounded-full bg-primary text-white font-bold text-xs transition-all';
            } else {
                btn.className = 'filter-btn px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-bold text-xs hover:bg-surface-container-high transition-all';
            }
        });
        
        renderOrders();
    }

    // Setup event listeners
    function setupEventListeners() {
        // Menu navigation
        const menuBtn = document.getElementById('menu-nav-btn');
        if (menuBtn) {
            menuBtn.onclick = () => window.location.href = '../customer_menu/code.html';
        }
        
        // Cart navigation
        const cartBtn = document.getElementById('cart-nav-btn');
        if (cartBtn) {
            cartBtn.onclick = () => window.location.href = '../cart_checkout/code.html';
        }
        
        // Kitchen navigation
        const kitchenBtn = document.getElementById('kitchen-nav-btn');
        if (kitchenBtn) {
            kitchenBtn.onclick = () => window.location.href = '../kitchen_queue/code.html';
        }
    }
</script>
