<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script>
    // Configuration - Use Supabase client directly for Vercel deployment
    // No backend needed - frontend calls Supabase directly
    const api = window.api;
    
    // State
    let cart = [];
    let orderType = 'dine-in';
    let specialInstructions = '';
    let selectedTableId = null;
    let tables = [];
    let menuItemsMap = {};

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        // Check for table ID in URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let tableId = urlParams.get('table');
        
        if (!tableId) {
            tableId = localStorage.getItem('currentTableId');
        }
        
        if (tableId) {
            selectedTableId = tableId;
            // Keep in localStorage until order is confirmed
        }
        
        loadCart();
        await loadTables();
        await loadMenuItems();
        setupEventListeners();
    });

    // Load cart from localStorage
    function loadCart() {
        const savedCart = localStorage.getItem('stitch_cart');
        if (savedCart) {
            cart = JSON.parse(savedCart);
            renderCartItems();
            updateSummary();
        }
    }

    // Load available tables
    async function loadTables() {
        try {
            const tables = await api.getTables();
            const availableTables = tables.filter(t => t.status === 'available');
            renderTableOptions(availableTables);
        } catch (err) {
            console.error('Failed to load tables:', err);
        }
    }

    // Load menu items for mapping
    async function loadMenuItems() {
        try {
            const items = await api.getMenuItems();
            items.forEach(item => {
                menuItemsMap[item.id] = item;
            });
        } catch (err) {
            console.error('Failed to load menu items:', err);
        }
    }

    // Render table options
    function renderTableOptions(availableTables) {
        const container = document.getElementById('table-options');
        if (!container) return;
        
        container.innerHTML = availableTables.map(table => `
            <button onclick="selectTable('${table.id}', '${table.table_number}')" 
                    class="table-btn flex-1 py-3 px-4 rounded-full font-bold flex items-center justify-center gap-2 transition-all"
                    data-table-id="${table.id}">
                <span class="material-symbols-outlined text-sm">table_restaurant</span>
                ${table.table_number}
            </button>
        `).join('');
        
        // If we have tables, prioritize the already selected one
        if (availableTables.length > 0) {
            const tableToSelect = availableTables.find(t => t.id === selectedTableId) || availableTables[0];
            selectTable(tableToSelect.id, tableToSelect.table_number);
        }
    }

    // Select table
    function selectTable(tableId, tableNumber) {
        selectedTableId = tableId;
        
        document.querySelectorAll('.table-btn').forEach(btn => {
            if (btn.dataset.tableId === tableId) {
                btn.className = 'table-btn flex-1 py-3 px-4 rounded-full bg-primary text-on-primary font-bold flex items-center justify-center gap-2 transition-all shadow-sm active:scale-95';
            } else {
                btn.className = 'table-btn flex-1 py-3 px-4 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2 hover:bg-surface-container transition-colors';
            }
        });
    }

    // Render cart items
    function renderCartItems() {
        const container = document.getElementById('cart-items');
        if (!container) return;
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12">
                    <span class="material-symbols-outlined text-6xl text-on-surface-variant/30">shopping_cart</span>
                    <p class="mt-4 text-on-surface-variant">Your cart is empty</p>
                    <button onclick="window.location.href='../customer_menu/code.html'" class="mt-4 px-6 py-2 bg-primary text-white rounded-full font-bold">
                        Browse Menu
                    </button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = cart.map((item, idx) => `
            <div class="bg-surface-container-low rounded-lg p-4 flex gap-4 items-center ${item.category === 'NƯỚC ÉP' ? 'border-l-4 border-secondary' : ''}">
                <div class="w-20 h-20 rounded-2xl overflow-hidden flex-shrink-0 bg-surface-container">
                    ${menuItemsMap[item.itemId]?.image_url ? `<img class="w-full h-full object-cover" src="${menuItemsMap[item.itemId].image_url}" alt="${item.name}"/>` : '<div class="w-full h-full flex items-center justify-center text-primary"><span class="material-symbols-outlined">coffee</span></div>'}
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-start">
                        <h3 class="text-lg font-bold leading-tight uppercase">${item.name}</h3>
                        <span class="font-bold text-primary">$${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                    <p class="text-sm text-on-surface-variant mt-1">${item.modifiers || 'Regular'}</p>
                    <div class="flex items-center justify-between mt-3">
                        <div class="flex items-center bg-surface-container-highest rounded-full px-2 py-1">
                            <button onclick="updateQuantity(${idx}, -1)" class="w-6 h-6 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-sm" data-icon="remove">remove</span>
                            </button>
                            <span class="px-3 font-bold text-sm">${item.quantity}</span>
                            <button onclick="updateQuantity(${idx}, 1)" class="w-6 h-6 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                            </button>
                        </div>
                        <button onclick="removeItem(${idx})" class="text-on-surface-variant/40">
                            <span class="material-symbols-outlined text-xl" data-icon="delete">delete</span>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Update quantity
    function updateQuantity(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
        saveCart();
        renderCartItems();
        updateSummary();
    }

    // Remove item
    function removeItem(index) {
        cart.splice(index, 1);
        saveCart();
        renderCartItems();
        updateSummary();
    }

    // Save cart
    function saveCart() {
        localStorage.setItem('stitch_cart', JSON.stringify(cart));
    }

    // Update summary
    function updateSummary() {
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;
        
        document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
        document.getElementById('total').textContent = `$${total.toFixed(2)}`;
    }

    // Set order type
    function setOrderType(type) {
        orderType = type;
        
        const dineInBtn = document.getElementById('dine-in-btn');
        const takeawayBtn = document.getElementById('takeaway-btn');
        
        if (type === 'dine-in') {
            dineInBtn.className = 'flex-1 py-3 px-6 rounded-full bg-primary text-on-primary font-bold flex items-center justify-center gap-2 shadow-sm transition-all active:scale-95';
            takeawayBtn.className = 'flex-1 py-3 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2 hover:bg-surface-container transition-colors';
        } else {
            takeawayBtn.className = 'flex-1 py-3 px-6 rounded-full bg-primary text-on-primary font-bold flex items-center justify-center gap-2 shadow-sm transition-all active:scale-95';
            dineInBtn.className = 'flex-1 py-3 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2 hover:bg-surface-container transition-colors';
        }
    }

    // Set special instructions
    function setSpecialInstructions(value) {
        specialInstructions = value;
    }

    // Confirm order
    async function confirmOrder() {
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        
        const submitBtn = document.getElementById('confirm-btn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Processing...';
        
        try {
            // Prepare order items
            const orderItems = cart.map(item => ({
                menu_item_id: item.itemId,
                quantity: item.quantity,
                price: item.price,
                modifiers: item.modifiers || null,
                special_instructions: item.specialInstructions || null
            }));
            
            // Get default staff (first active staff)
            const staff = await api.getStaff();
            const defaultStaff = staff[0]?.id;
            
            const order = await api.createOrder({
                table_id: orderType === 'dine-in' ? selectedTableId : null,
                staff_id: defaultStaff,
                order_type: orderType,
                items: orderItems,
                special_instructions: specialInstructions
            });
            
            // Clear cart and table
            cart = [];
            saveCart();
            localStorage.removeItem('currentTableId');
            
            // Show success and redirect to kitchen
            alert(`Order #${order.order_number} created successfully!`);
            window.location.href = '../kitchen_queue/code.html';
            
        } catch (err) {
            console.error('Failed to create order:', err);
            alert('Failed to create order. Please try again.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = `Confirm Order <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>`;
        }
    }

    // Setup event listeners
    function setupEventListeners() {
        // Close button
        const closeBtn = document.getElementById('close-btn');
        if (closeBtn) {
            closeBtn.onclick = () => window.location.href = '../customer_menu/code.html';
        }
        
        // Confirm button
        const confirmBtn = document.getElementById('confirm-btn');
        if (confirmBtn) {
            confirmBtn.onclick = confirmOrder;
        }
        
        // Special instructions
        const notesTextarea = document.getElementById('special-instructions');
        if (notesTextarea) {
            notesTextarea.onchange = (e) => setSpecialInstructions(e.target.value);
        }
        
        // Menu navigation
        const menuBtn = document.getElementById('menu-nav-btn');
        if (menuBtn) {
            menuBtn.onclick = () => window.location.href = '../customer_menu/code.html';
        }
        
        // Kitchen navigation
        const kitchenBtn = document.getElementById('kitchen-nav-btn');
        if (kitchenBtn) {
            kitchenBtn.onclick = () => window.location.href = '../kitchen_queue/code.html';
        }
        
        // History navigation
        const historyBtn = document.getElementById('history-nav-btn');
        if (historyBtn) {
            historyBtn.onclick = () => window.location.href = '../order_history/code.html';
        }
    }
</script>

</div>
