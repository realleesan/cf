<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Your Basket - M Coffee</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #f9f9f8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-body text-on-surface antialiased">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-surface/80 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">coffee</span>
            <h1 class="font-headline font-black tracking-tight text-xl text-primary">M Coffee</h1>
        </div>
        <button onclick="window.location.href='../customer_menu/code.html'" class="w-10 h-10 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary">close</span>
        </button>
    </header>

    <main class="pt-24 px-6 pb-44">
        <h2 class="text-5xl font-black text-primary mb-2">Your Basket</h2>
        <p class="text-on-surface-variant font-medium mb-8">Review your handcrafted selection</p>

        <!-- Cart Items -->
        <div id="cart-items" class="space-y-4 mb-8">
            <!-- Items loaded dynamically -->
        </div>

        <!-- Order Type Selection -->
        <div class="flex bg-stone-100 p-2 rounded-full mb-8">
            <button id="dine-in-btn" onclick="setOrderType('dine-in')" class="flex-1 py-3 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2 transition-all">
                <span class="material-symbols-outlined text-sm">restaurant</span> Dine-in
            </button>
            <button id="takeaway-btn" onclick="setOrderType('takeaway')" class="flex-1 py-3 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2 transition-all">
                <span class="material-symbols-outlined text-sm">shopping_bag</span> Takeaway
            </button>
        </div>

        <!-- Table Display (if dine-in) -->
        <div id="table-selection-area" class="mb-8">
            <h3 class="text-sm font-bold text-on-surface-variant uppercase tracking-widest mb-4">Table Selection</h3>
            <div id="table-options" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <!-- Tables loaded dynamically -->
            </div>
        </div>

        <!-- Summary -->
        <div class="bg-surface-container/50 rounded-3xl p-8 space-y-4 mb-8">
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-bold tracking-widest text-xs uppercase">Subtotal</span>
                <span id="subtotal" class="font-bold">$0.00</span>
            </div>
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-bold tracking-widest text-xs uppercase">VAT (8%)</span>
                <span id="tax" class="font-bold">$0.00</span>
            </div>
            <div class="h-[1px] bg-stone-200"></div>
            <div class="flex justify-between items-center">
                <span class="text-xl font-black text-primary">Total Price</span>
                <span id="total" class="text-3xl font-black text-primary">$0.00</span>
            </div>
        </div>

        <!-- Special Instructions -->
        <label class="block text-sm font-bold text-on-surface-variant uppercase tracking-widest mb-4">Special Instructions</label>
        <textarea id="instructions" placeholder="Add a note (e.g. less ice, extra shot)..." class="w-full bg-stone-100 border-none rounded-3xl p-6 text-sm focus:ring-2 focus:ring-primary min-h-[120px] mb-8"></textarea>

        <!-- Checkout Button -->
        <button id="submit-btn" onclick="confirmOrder()" class="w-full py-6 rounded-[2rem] bg-primary text-white font-black text-xl flex items-center justify-center gap-4 shadow-2xl shadow-primary/30 active:scale-95 transition-all">
            Confirm Order <span class="material-symbols-outlined">arrow_forward</span>
        </button>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)]">
        <div onclick="window.location.href='../m_coffee_visual_table_layout/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">grid_view</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">menu_book</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Menu</span>
        </div>
        <div class="flex flex-col items-center justify-center gap-1 min-w-[64px]">
            <div class="bg-primary text-white rounded-2xl p-3 w-12 h-12 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
            </div>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Cart</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">cooking</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">Kitchen</span>
        </div>
        <div onclick="window.location.href='../order_history/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-40 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl">history</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black">History</span>
        </div>
    </nav>

    <script shadow>
        let cart = [];
        let orderType = 'dine-in';
        let selectedTableId = localStorage.getItem('currentTableId');
        let tables = [];
        let menuItemsMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            loadCart();
            await initializeData();
        });

        async function initializeData() {
            let retryCount = 0;
            while (!window.api && retryCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                retryCount++;
            }
            if (!window.api) return;
            
            try {
                // Load menu items for mapping
                const items = await window.api.getMenuItems();
                items.forEach(i => menuItemsMap[i.id] = i);
                renderCartItems();
                updateSummary();
                
                // Load tables
                tables = await window.api.getTables();
                renderTableOptions();
            } catch (err) { console.error(err); }
        }

        function loadCart() {
            const saved = localStorage.getItem('stitch_cart');
            if (saved) cart = JSON.parse(saved);
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center py-12 opacity-50">Your basket is empty</div>';
                return;
            }
            container.innerHTML = cart.map((item, idx) => `
                <div class="bg-white rounded-3xl p-6 flex gap-4 items-center shadow-sm relative overflow-hidden">
                    <div class="w-20 h-20 rounded-2xl bg-stone-100 overflow-hidden flex-shrink-0">
                        <img src="${menuItemsMap[item.itemId]?.image_url || ''}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-primary leading-tight uppercase text-lg">${item.name}</h3>
                            <span class="font-black text-primary">$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                        <p class="text-xs text-on-surface-variant font-medium mt-1">Custom • ${item.modifiers || 'Handcrafted'}</p>
                        <div class="flex items-center justify-between mt-3">
                            <div class="flex items-center bg-stone-100 rounded-full px-2 py-1">
                                <button onclick="updateQty(${idx}, -1)" class="w-8 h-8 flex items-center justify-center text-primary">
                                    <span class="material-symbols-outlined text-sm">remove</span>
                                </button>
                                <span class="px-4 font-black">${item.quantity}</span>
                                <button onclick="updateQty(${idx}, 1)" class="w-8 h-8 flex items-center justify-center text-primary">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                </button>
                            </div>
                            <button onclick="removeItem(${idx})" class="text-stone-300 hover:text-red-400">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(idx, delta) {
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
            saveAndRender();
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('stitch_cart', JSON.stringify(cart));
            renderCartItems();
            updateSummary();
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const tax = subtotal * 0.08;
            const total = subtotal + tax;
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('dine-in-btn').className = type === 'dine-in' ? 
                'flex-1 py-3 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2' : 
                'flex-1 py-3 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2';
            document.getElementById('takeaway-btn').className = type === 'takeaway' ? 
                'flex-1 py-3 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2' : 
                'flex-1 py-3 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2';
            document.getElementById('table-selection-area').style.display = type === 'dine-in' ? 'block' : 'none';
        }

        function renderTableOptions() {
            const container = document.getElementById('table-options');
            const available = tables.filter(t => t.status === 'available' || t.id === selectedTableId);
            container.innerHTML = available.map(t => `
                <button onclick="selectTable('${t.id}')" data-table-id="${t.id}" class="table-btn px-6 py-2 rounded-full font-bold transition-all border-2 ${t.id === selectedTableId ? 'bg-primary text-white border-primary' : 'bg-white text-on-surface-variant border-stone-100 hover:border-stone-200'}">
                    ${t.table_number}
                </button>
            `).join('');
        }

        function selectTable(id) {
            selectedTableId = id;
            localStorage.setItem('currentTableId', id);
            renderTableOptions();
        }

        async function confirmOrder() {
            if (cart.length === 0) return alert('Your basket is empty');
            if (orderType === 'dine-in' && !selectedTableId) return alert('Please select a table');

            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING';
            btn.disabled = true;

            try {
                const api = window.api;
                const order = await api.createOrder({
                    table_id: orderType === 'dine-in' ? selectedTableId : null,
                    order_type: orderType,
                    items: cart.map(i => ({ menu_item_id: i.itemId, quantity: i.quantity, price: i.price })),
                    special_instructions: document.getElementById('instructions').value
                });
                
                localStorage.removeItem('stitch_cart');
                localStorage.removeItem('currentTableId');
                window.location.href = '../kitchen_queue/code.html';
            } catch (err) {
                console.error(err);
                btn.innerHTML = 'Error - Try Again';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
