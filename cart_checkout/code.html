<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Your Basket - M Coffee</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #f9f9f8; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#553722",
                        secondary: "#4a6549",
                        'surface-container': "#eeeeed",
                        'on-surface-variant': "#50453e",
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body text-on-surface antialiased bg-[#f9f9f8]">
    <!-- Header -->
    <header class="fixed top-0 w-full z-100 flex justify-between items-center px-6 py-6 bg-[#f9f9f8]/80 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">coffee</span>
            <h1 class="font-headline font-black tracking-tight text-xl text-primary">M Coffee</h1>
        </div>
        <button onclick="window.location.href='../customer_menu/code.html'" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm">
            <span class="material-symbols-outlined text-primary text-sm font-bold">close</span>
        </button>
    </header>

    <main class="pt-28 px-6 pb-44">
        <h2 class="text-5xl font-black text-primary mb-2">Your Basket</h2>
        <p class="text-on-surface-variant font-medium mb-8">Review your handcrafted selection</p>

        <!-- Cart Items -->
        <div id="cart-items" class="space-y-4 mb-8">
            <!-- Items loaded dynamically -->
        </div>

        <!-- Order Type Selection -->
        <div class="flex bg-stone-100 p-1.5 rounded-full mb-8">
            <button id="dine-in-btn" onclick="setOrderType('dine-in')" class="flex-1 py-3.5 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-sm">restaurant</span> Dine-in
            </button>
            <button id="takeaway-btn" onclick="setOrderType('takeaway')" class="flex-1 py-3.5 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2 transition-all">
                <span class="material-symbols-outlined text-sm">shopping_bag</span> Takeaway
            </button>
        </div>

        <!-- Table Display -->
        <div id="table-selection-area" class="mb-10">
            <h3 class="text-xs font-black text-on-surface-variant uppercase tracking-[0.2em] mb-4">Table Selection</h3>
            <div id="table-options" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                <!-- Tables loaded dynamically -->
            </div>
        </div>

        <!-- Summary -->
        <div class="bg-white rounded-[2.5rem] p-8 space-y-5 mb-8 shadow-sm">
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-black tracking-[0.1em] text-[10px] uppercase">Subtotal</span>
                <span id="subtotal" class="font-black text-primary">$0.00</span>
            </div>
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-black tracking-[0.1em] text-[10px] uppercase">VAT (8%)</span>
                <span id="tax" class="font-black text-primary">$0.00</span>
            </div>
            <div class="h-[1px] bg-stone-100"></div>
            <div class="flex justify-between items-center">
                <span class="text-xl font-black text-primary">Total Price</span>
                <span id="total" class="text-3xl font-black text-primary">$0.00</span>
            </div>
        </div>

        <!-- Special Instructions -->
        <div class="mb-10">
            <label class="block text-xs font-black text-on-surface-variant uppercase tracking-[0.2em] mb-4">Special Instructions</label>
            <textarea id="instructions" placeholder="Add a note (e.g. less ice, extra shot)..." class="w-full bg-white border-2 border-stone-50 rounded-3xl p-6 text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all min-h-[140px] shadow-sm"></textarea>
        </div>

        <!-- Checkout Button -->
        <button id="submit-btn" onclick="confirmOrder()" class="w-full py-7 rounded-[2rem] bg-primary text-white font-black text-xl flex items-center justify-center gap-4 shadow-2xl shadow-primary/30 active:scale-95 transition-all">
            Confirm Order <span class="material-symbols-outlined">arrow_forward</span>
        </button>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-100 flex justify-around items-center px-4 pb-8 pt-4 bg-white/90 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-20px_50px_rgba(80,69,62,0.1)]">
        <div onclick="window.location.href='../m_coffee_visual_table_layout/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-30 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl text-primary">grid_view</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Tables</span>
        </div>
        <div onclick="window.location.href='../customer_menu/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-30 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl text-primary">menu_book</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Menu</span>
        </div>
        <div class="flex flex-col items-center justify-center gap-1 min-w-[64px]">
            <div class="bg-primary text-white rounded-2xl p-3 w-12 h-12 flex items-center justify-center shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
            </div>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Cart</span>
        </div>
        <div onclick="window.location.href='../kitchen_queue/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-30 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl text-primary">cooking</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">Kitchen</span>
        </div>
        <div onclick="window.location.href='../order_history/code.html'" class="flex flex-col items-center justify-center gap-1 min-w-[64px] opacity-30 hover:opacity-100 transition-opacity cursor-pointer">
            <span class="material-symbols-outlined text-2xl text-primary">history</span>
            <span class="font-body text-[10px] uppercase tracking-widest font-black text-primary">History</span>
        </div>
    </nav>

    <script shadow>
        let cart = [];
        let orderType = 'dine-in';
        let selectedTableId = localStorage.getItem('currentTableId');
        let tables = [];
        let menuItemsMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            loadCart();
            await initializeData();
        });

        async function initializeData() {
            let retryCount = 0;
            while (!window.api && retryCount < 50) {
                await new Promise(r => setTimeout(r, 100));
                retryCount++;
            }
            if (!window.api) return;
            
            try {
                const items = await window.api.getMenuItems();
                items.forEach(i => menuItemsMap[i.id] = i);
                renderCartItems();
                updateSummary();
                
                tables = await window.api.getTables();
                renderTableOptions();
            } catch (err) { console.error(err); }
        }

        function loadCart() {
            const saved = localStorage.getItem('stitch_cart');
            if (saved) cart = JSON.parse(saved);
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center py-16 opacity-30 font-black uppercase tracking-widest text-xs">Your basket is empty</div>';
                return;
            }
            container.innerHTML = cart.map((item, idx) => `
                <div class="bg-white rounded-[2.5rem] p-6 flex gap-5 items-center shadow-sm relative overflow-hidden group">
                    <div class="w-24 h-24 rounded-3xl bg-stone-100 overflow-hidden flex-shrink-0 shadow-inner">
                        <img src="${menuItemsMap[item.itemId]?.image_url || 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=200'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-primary leading-tight uppercase text-lg tracking-tight">${item.name}</h3>
                            <span class="font-black text-primary text-lg">$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                        <p class="text-[10px] text-secondary font-black uppercase tracking-widest mt-1 opacity-60">Handcrafted • ${item.modifiers || 'Classic'}</p>
                        <div class="flex items-center justify-between mt-4">
                            <div class="flex items-center bg-stone-50 rounded-full p-1 border border-stone-100">
                                <button onclick="updateQty(${idx}, -1)" class="w-9 h-9 flex items-center justify-center text-primary bg-white rounded-full shadow-sm active:scale-90 transition-transform">
                                    <span class="material-symbols-outlined text-sm font-bold">remove</span>
                                </button>
                                <span class="px-5 font-black text-primary">${item.quantity}</span>
                                <button onclick="updateQty(${idx}, 1)" class="w-9 h-9 flex items-center justify-center text-primary bg-white rounded-full shadow-sm active:scale-90 transition-transform">
                                    <span class="material-symbols-outlined text-sm font-bold">add</span>
                                </button>
                            </div>
                            <button onclick="removeItem(${idx})" class="w-10 h-10 flex items-center justify-center text-stone-200 hover:text-red-400 transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </div>
                    ${item.category === 'NƯỚC ÉP' ? '<div class="absolute top-0 left-0 w-2 h-full bg-secondary opacity-20"></div>' : ''}
                </div>
            `).join('');
        }

        function updateQty(idx, delta) {
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
            saveAndRender();
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('stitch_cart', JSON.stringify(cart));
            renderCartItems();
            updateSummary();
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const tax = subtotal * 0.08;
            const total = subtotal + tax;
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        function setOrderType(type) {
            orderType = type;
            const dineIn = document.getElementById('dine-in-btn');
            const takeaway = document.getElementById('takeaway-btn');
            
            if (type === 'dine-in') {
                dineIn.className = 'flex-1 py-3.5 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20';
                takeaway.className = 'flex-1 py-3.5 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2';
                document.getElementById('table-selection-area').style.display = 'block';
            } else {
                takeaway.className = 'flex-1 py-3.5 px-6 rounded-full bg-primary text-white font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20';
                dineIn.className = 'flex-1 py-3.5 px-6 rounded-full text-on-surface-variant font-bold flex items-center justify-center gap-2';
                document.getElementById('table-selection-area').style.display = 'none';
            }
        }

        function renderTableOptions() {
            const container = document.getElementById('table-options');
            const available = tables.filter(t => t.status === 'available' || t.id === selectedTableId);
            container.innerHTML = available.map(t => `
                <button onclick="selectTable('${t.id}')" data-table-id="${t.id}" class="px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest transition-all border-2 ${t.id === selectedTableId ? 'bg-primary text-white border-primary shadow-md shadow-primary/20' : 'bg-white text-stone-300 border-stone-50 hover:border-stone-100 shadow-sm'}">
                    ${t.table_number}
                </button>
            `).join('');
        }

        function selectTable(id) {
            selectedTableId = id;
            localStorage.setItem('currentTableId', id);
            renderTableOptions();
        }

        async function confirmOrder() {
            if (cart.length === 0) return;
            if (orderType === 'dine-in' && !selectedTableId) return;

            const btn = document.getElementById('submit-btn');
            const original = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING';
            btn.disabled = true;

            try {
                const api = window.api;
                await api.createOrder({
                    table_id: orderType === 'dine-in' ? selectedTableId : null,
                    order_type: orderType,
                    items: cart.map(i => ({ menu_item_id: i.itemId, quantity: i.quantity, price: i.price })),
                    special_instructions: document.getElementById('instructions').value
                });
                
                localStorage.removeItem('stitch_cart');
                localStorage.removeItem('currentTableId');
                window.location.href = '../kitchen_queue/code.html';
            } catch (err) {
                console.error(err);
                btn.innerHTML = 'ERROR - RETRY';
                btn.disabled = false;
                setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2000);
            }
        }
    </script>
</body>
</html>
