<script>
    // Configuration - Use Supabase client directly
    const api = window.api;
    
    // State
    let orders = [];
    let activeFilter = 'active';
    let refreshInterval = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadOrders();
        setupEventListeners();
        
        // Auto-refresh every 30 seconds
        refreshInterval = setInterval(loadOrders, 30000);
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (refreshInterval) clearInterval(refreshInterval);
    });

    // Load orders from API
    async function loadOrders() {
        let retryCount = 0;
        while (!window.api && retryCount < 50) {
            await new Promise(resolve => setTimeout(resolve, 100));
            retryCount++;
        }
        const api = window.api;
        if (!api) return;

        try {
            orders = activeFilter === 'active' 
                ? await api.getActiveOrders()
                : await api.getOrderHistory();
            
            renderOrders();
            updateCounts();
        } catch (err) {
            console.error('Failed to load orders:', err);
        }
    }

    // Update order counts
    function updateCounts() {
        const activeCount = orders.filter(o => ['pending', 'preparing'].includes(o.status)).length;
        // The user wants ready orders to move out of kitchen view, so we'll treat them separately or just let them "vanish"
        
        const activeBtn = document.getElementById('active-btn');
        if (activeBtn) {
            activeBtn.innerHTML = `<span class="material-symbols-outlined text-sm" data-icon="pending">pending</span> ACTIVE (${activeCount})`;
        }
    }

    // Render orders
    function renderOrders() {
        const container = document.getElementById('kitchen-grid');
        if (!container) return;
        
        if (orders.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <span class="material-symbols-outlined text-6xl text-on-surface-variant/30">receipt_long</span>
                    <p class="mt-4 text-on-surface-variant">No orders found</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = orders
            .filter(o => activeFilter === 'active' ? ['pending', 'preparing'].includes(o.status) : o.status === 'ready') // Show ready only in specific tab if needed, or hide
            .map(order => {
            const isUrgent = order.status === 'urgent' || (order.status === 'pending' && getTimeDiff(order.order_time) > 10);
            const isPreparing = order.status === 'preparing';
            const isReady = order.status === 'ready';
            
            const borderClass = isUrgent 
                ? 'hover:bg-gradient-to-br hover:from-primary/10 hover:to-transparent' 
                : isPreparing 
                    ? 'border-2 border-secondary/20'
                    : '';
            
            const statusBadge = getStatusBadge(order.status, order.order_time);
            
            return `
                <div class="group bg-surface-container-low p-1 rounded-xl transition-all duration-300 ${borderClass}">
                    <div class="bg-surface-container-lowest p-6 rounded-[2.5rem] h-full flex flex-col">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/60 font-bold">Order Number</span>
                                <h3 class="font-headline text-3xl font-black text-primary">#${order.order_number}</h3>
                            </div>
                            ${statusBadge}
                        </div>
                        <div class="space-y-4 flex-grow">
                            <div class="flex justify-between items-center group/item">
                                <div class="flex items-center gap-4">
                                    <span class="w-8 h-8 rounded-full bg-primary-fixed text-on-primary-fixed-variant flex items-center justify-center font-bold text-sm">${order.order_items ? order.order_items.reduce((acc, i) => acc + i.quantity, 0) : 1}</span>
                                    <span class="font-body font-extrabold text-lg uppercase tracking-tight">Items</span>
                                </div>
                                <span class="text-tertiary font-body font-bold">
                                    ${order.order_type === 'takeaway' ? 'Takeaway' : `Table ${order.tables?.table_number || '?'}`}
                                </span>
                            </div>
                        </div>
                        <div class="mt-2 space-y-2 border-t border-outline-variant/10 pt-2 text-sm text-on-surface">
                            ${order.order_items ? order.order_items.map(i => `<div class="flex justify-between items-center"><span class="font-bold">${i.quantity}x ${i.menu_items?.name || 'Item'}</span></div>`).join('') : ''}
                        </div>
                        ${order.special_instructions ? `
                        <div class="mt-4 p-3 rounded-lg bg-surface-container-low">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="material-symbols-outlined text-sm text-primary" data-icon="notes">notes</span>
                                <span class="font-label text-[10px] uppercase font-black text-on-surface-variant">Note</span>
                            </div>
                            <p class="font-body text-sm text-on-surface italic">"${order.special_instructions}"</p>
                        </div>
                        ` : ''}
                        <div class="mt-6 pt-4 border-t border-outline-variant/20">
                            ${getActionButtons(order)}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Get status badge
    function getStatusBadge(status, orderTime) {
        const minutes = getTimeDiff(orderTime);
        
        switch(status) {
            case 'urgent':
                return `<div class="bg-error-container text-on-error-container px-3 py-1 rounded-full font-label text-[10px] font-black tracking-tighter">URGENT • ${minutes} MIN</div>`;
            case 'pending':
                return `<div class="bg-surface-container-high text-on-surface-variant px-3 py-1 rounded-full font-label text-[10px] font-black tracking-tighter">PENDING • ${minutes} MIN</div>`;
            case 'preparing':
                return `<div class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label text-[10px] font-black tracking-tighter">PREPARING...</div>`;
            case 'ready':
                return `<div class="bg-secondary text-on-secondary px-3 py-1 rounded-full font-label text-[10px] font-black tracking-tighter">READY</div>`;
            default:
                return '';
        }
    }

    // Get action buttons based on status
    function getActionButtons(order) {
        switch(order.status) {
            case 'pending':
                return `
                    <button onclick="startPreparing('${order.id}')" class="w-full bg-primary text-white py-4 rounded-full font-label font-bold tracking-widest flex items-center justify-center gap-2 transition-transform active:scale-95">
                        START PREPARING
                        <span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
                    </button>
                `;
            case 'preparing':
                return `
                    <div class="flex gap-3">
                        <button onclick="revertOrder('${order.id}', 'pending')" class="flex-1 border-2 border-outline-variant text-on-surface-variant py-4 rounded-full font-label font-bold tracking-widest transition-colors hover:bg-surface-container-low">
                            REVERT
                        </button>
                        <button onclick="markReady('${order.id}')" class="flex-[2] bg-secondary text-white py-4 rounded-full font-label font-bold tracking-widest flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-secondary/20">
                            MARK AS READY
                            <span class="material-symbols-outlined" data-icon="check">check</span>
                        </button>
                    </div>
                `;
            case 'ready':
                return `
                    <button onclick="completeOrder('${order.id}')" class="w-full bg-secondary text-white py-4 rounded-full font-label font-bold tracking-widest flex items-center justify-center gap-2 transition-transform active:scale-95">
                        COMPLETE ORDER
                        <span class="material-symbols-outlined" data-icon="done_all">done_all</span>
                    </button>
                `;
            default:
                return '';
        }
    }

    // Get time difference in minutes
    function getTimeDiff(orderTime) {
        const order = new Date(orderTime);
        const now = new Date();
        return Math.floor((now - order) / 60000);
    }

    async function startPreparing(orderId) {
        const api = window.api;
        if (!api) return;
        try {
            await api.updateOrderStatus(orderId, 'preparing');
            await loadOrders();
        } catch (err) {
            console.error('Failed to start preparing:', err);
            alert('Failed to update order status');
        }
    }

    // Mark order as ready
    async function markReady(orderId) {
        const api = window.api;
        if (!api) return;
        try {
            await api.updateOrderStatus(orderId, 'ready');
            // User requested no printing and moving straight to ready (vanishing from active kitchen view)
            await loadOrders();
        } catch (err) {
            console.error('Failed to mark ready:', err);
            alert('Failed to update order status');
        }
    }

    // Print kitchen ticket
    async function printKitchenTicket(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        // Get order items
        const { data: items } = await window.supabaseClient
            .from('order_items')
            .select('*, menu_item:menu_items(name)')
            .eq('order_id', orderId);
        
        const printWindow = window.open('', '_blank', 'width=400,height=600');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Phiếu chuyển bếp - ${order.order_number}</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 20px; margin: 0; }
                    .header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
                    .title { font-size: 18px; font-weight: bold; }
                    .order-info { margin: 10px 0; }
                    .order-number { font-size: 24px; font-weight: bold; }
                    .items { margin: 20px 0; }
                    .item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; }
                    .item-name { font-weight: bold; }
                    .item-qty { color: #666; }
                    .footer { text-align: center; border-top: 2px dashed #000; padding-top: 10px; margin-top: 10px; font-size: 12px; }
                    @media print { body { padding: 0; } }
                </style>
            </head>
            <body>
                <div class="header">
                    <div class="title">THE ARTISANAL</div>
                    <div>PHIẾU CHUYỂN BẾP</div>
                </div>
                <div class="order-info">
                    <div class="order-number">#${order.order_number}</div>
                    <div>Bàn: ${order.table_id ? 'Bàn ' + order.table_id : 'Mang đi'}</div>
                    <div>Giờ: ${new Date(order.created_at).toLocaleTimeString('vi-VN')}</div>
                </div>
                <div class="items">
                    ${items ? items.map(function(item) { return '<div class="item"><span class="item-name">' + item.quantity + 'x ' + (item.menu_item ? item.menu_item.name : 'Item') + '</span><span class="item-qty">' + (item.special_instructions || '') + '</span></div>'; }).join('') : ''}
                </div>
                <div class="footer">
                    Cảm ơn quý khách!
                </div>
                <script>window.onload = function() { window.print(); window.close(); }<\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    // Complete order
    async function completeOrder(orderId) {
        const api = window.api;
        if (!api) return;
        try {
            await api.updateOrderStatus(orderId, 'completed');
            await loadOrders();
        } catch (err) {
            console.error('Failed to complete order:', err);
            alert('Failed to update order status');
        }
    }

    // Revert order status
    async function revertOrder(orderId, newStatus) {
        const api = window.api;
        if (!api) return;
        try {
            await api.updateOrderStatus(orderId, newStatus);
            await loadOrders();
        } catch (err) {
            console.error('Failed to revert order:', err);
            alert('Failed to update order status');
        }
    }

    // Set filter
    function setFilter(filter) {
        activeFilter = filter;
        
        const activeBtn = document.getElementById('active-btn');
        const readyBtn = document.getElementById('ready-btn');
        
        if (filter === 'active') {
            activeBtn.className = 'px-6 py-3 rounded-full bg-primary text-white font-label font-bold text-sm flex items-center gap-2 shadow-xl shadow-primary/20';
            readyBtn.className = 'px-6 py-3 rounded-full bg-secondary-container text-on-secondary-container font-label font-bold text-sm flex items-center gap-2 hover:opacity-80 transition-opacity';
        } else {
            readyBtn.className = 'px-6 py-3 rounded-full bg-primary text-white font-label font-bold text-sm flex items-center gap-2 shadow-xl shadow-primary/20';
            activeBtn.className = 'px-6 py-3 rounded-full bg-secondary-container text-on-secondary-container font-label font-bold text-sm flex items-center gap-2 hover:opacity-80 transition-opacity';
        }
        
        loadOrders();
    }

    // Setup event listeners
    function setupEventListeners() {
        // Active filter
        const activeBtn = document.getElementById('active-btn');
        if (activeBtn) {
            activeBtn.onclick = () => setFilter('active');
        }
        
        // Ready filter
        const readyBtn = document.getElementById('ready-btn');
        if (readyBtn) {
            readyBtn.onclick = () => setFilter('ready');
        }
        
        // Menu navigation
        const menuBtn = document.getElementById('menu-nav-btn');
        if (menuBtn) {
            menuBtn.onclick = () => window.location.href = '../customer_menu/code.html';
        }
        
        // Cart navigation
        const cartBtn = document.getElementById('cart-nav-btn');
        if (cartBtn) {
            cartBtn.onclick = () => window.location.href = '../cart_checkout/code.html';
        }
        
        // History navigation
        const historyBtn = document.getElementById('history-nav-btn');
        if (historyBtn) {
            historyBtn.onclick = () => window.location.href = '../order_history/code.html';
        }
    }
</script>
