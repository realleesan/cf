<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }

    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<script>
    // Configuration
    // Configuration - Use Supabase client directly
    const api = window.api;
    
    // State
    let tables = [];
    let currentFilter = 'all';

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadTables();
        setupEventListeners();
    });

    // Load tables from API
    async function loadTables() {
        try {
            tables = await api.getTables();
            
            renderTables();
            updateStats();
        } catch (err) {
            console.error('Failed to load tables:', err);
            renderTablesFallback();
        }
    }

    // Update statistics
    function updateStats() {
        const available = tables.filter(t => t.status === 'available').length;
        const occupied = tables.filter(t => t.status === 'occupied').length;
        
        document.getElementById('available-count').textContent = available;
        document.getElementById('occupied-count').textContent = occupied;
    }

    // Render tables
    function renderTables() {
        const container = document.getElementById('tables-grid');
        if (!container) return;
        
        let filteredTables = tables;
        if (currentFilter !== 'all') {
            filteredTables = tables.filter(t => t.status === currentFilter);
        }
        
        // Group by floor zone
        const grouped = {};
        filteredTables.forEach(table => {
            const zone = table.floor_zone || 'ground_floor';
            if (!grouped[zone]) grouped[zone] = [];
            grouped[zone].push(table);
        });
        
        let html = '';
        
        for (const [zone, zoneTables] of Object.entries(grouped)) {
            const zoneName = zone === 'ground_floor' ? 'Ground Floor' : zone;
            
            html += `
                <section class="mb-8">
                    <h3 class="text-lg font-bold text-primary mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined">floor</span>
                        ${zoneName}
                    </h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            `;
            
            zoneTables.forEach(table => {
                const isAvailable = table.status === 'available';
                const statusColor = isAvailable ? 'bg-secondary-container' : 'bg-primary-container';
                const statusText = isAvailable ? 'text-on-secondary-container' : 'text-on-primary';
                
                html += `
                    <div onclick="selectTable('${table.id}')" class="table-card relative bg-surface-container-low rounded-2xl p-4 cursor-pointer transition-all hover:shadow-lg hover:-translate-y-1 ${currentFilter === table.status ? 'ring-2 ring-primary' : ''}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-2xl font-black text-primary">${table.table_number}</span>
                            <span class="material-symbols-outlined ${isAvailable ? 'text-secondary' : 'text-primary'}">
                                ${isAvailable ? 'check_circle' : '_groups'}
                            </span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold px-2 py-1 rounded-full ${statusColor} ${statusText}">
                                ${table.status.toUpperCase()}
                            </span>
                            <span class="text-xs text-on-surface-variant flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm">person</span>
                                ${table.capacity}
                            </span>
                        </div>
                        ${table.order_number ? `
                        <div class="mt-3 pt-3 border-t border-outline-variant/20">
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-on-surface-variant">Order</span>
                                <span class="text-xs font-bold text-primary">#${table.order_number}</span>
                            </div>
                            ${table.total_amount ? `
                            <div class="flex justify-between items-center mt-1">
                                <span class="text-xs text-on-surface-variant">Total</span>
                                <span class="text-xs font-bold text-primary">$${parseFloat(table.total_amount).toFixed(2)}</span>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                    </div>
                `;
            });
            
            html += '</div></section>';
        }
        
        container.innerHTML = html || '<div class="text-center py-12 text-on-surface-variant">No tables found</div>';
    }

    // Render fallback
    function renderTablesFallback() {
        const container = document.getElementById('tables-grid');
        container.innerHTML = `
            <div class="text-center py-12">
                <span class="material-symbols-outlined text-6xl text-on-surface-variant/30">table_restaurant</span>
                <p class="mt-4 text-on-surface-variant">Loading tables...</p>
            </div>
        `;
    }

    // Select table (show details)
    async function selectTable(tableId) {
        const table = tables.find(t => t.id === tableId);
        if (!table) return;
        
        if (table.status === 'occupied' && table.current_order_id) {
            // Navigate to kitchen to view current order
            window.location.href = '../kitchen_queue/code.html';
        } else {
            // Table is available - go to menu to create new order
            window.location.href = `../customer_menu/code.html?table=${tableId}`;
        }
    }

    // Set filter
    function setFilter(filter) {
        currentFilter = filter;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === filter) {
                btn.className = 'filter-btn px-4 py-2 rounded-full bg-primary text-white font-bold text-xs transition-all';
            } else {
                btn.className = 'filter-btn px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-bold text-xs hover:bg-surface-container-high transition-all';
            }
        });
        
        renderTables();
    }

    // Setup event listeners
    function setupEventListeners() {
        // Profile click
        const profileBtn = document.getElementById('profile-btn');
        if (profileBtn) {
            profileBtn.onclick = () => window.location.href = '../hi_u_su_t_nh_n_vi_n_so_s_nh_thu_nh_p/code.html';
        }
    }
</script>

    </div>
    <p id="occupied-count" class="text-4xl font-black text-on-primary-container">0</p>
</div>
</section>
<!-- Filter Row -->
<section class="flex gap-2 mb-6">
<button onclick="setFilter('all')" class="filter-btn px-4 py-2 rounded-full bg-primary text-white font-bold text-xs transition-all" data-filter="all">All</button>
<button onclick="setFilter('available')" class="filter-btn px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-bold text-xs hover:bg-surface-container-high transition-all" data-filter="available">Available</button>
<button onclick="setFilter('occupied')" class="filter-btn px-4 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-bold text-xs hover:bg-surface-container-high transition-all" data-filter="occupied">Occupied</button>
</section>
<!-- Tables Grid -->
<div id="tables-grid" class="space-y-8">
<!-- Tables will be loaded dynamically -->
</div>
